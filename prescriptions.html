<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prescriptions — Ruhena Healthcare</title>
<link rel="stylesheet" href="shared.css">
<style>
  .rx-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin-top:20px;}
  .rx-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;transition:all .2s;}
  .rx-card:hover{border-color:var(--p-400);box-shadow:var(--shadow);}
  .rx-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
  .rx-patient{font-weight:700;font-size:15px;}
  .rx-doctor{font-size:12px;color:var(--text3);}
  .rx-meds{margin:12px 0;padding:12px;background:var(--surface2);border-radius:var(--r-sm);font-size:13px;line-height:1.8;}
  .rx-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
  .rx-date{font-size:12px;color:var(--text3);}
</style>
</head>
<body>
<div class="page-wrap">
  <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="drawer-logo"><i class="bi bi-capsule"></i></div>
      <div class="drawer-brand">Ruhena <span>Healthcare</span></div>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-user">
      <div class="drawer-user-avatar" id="drawer-avatar">A</div>
      <div class="drawer-user-info">
        <div class="drawer-user-name" id="drawer-name">Admin</div>
        <div class="drawer-user-role" id="drawer-role">Owner</div>
      </div>
    </div>
    <div class="drawer-nav" id="drawer-nav"></div>
    <div class="drawer-footer">
      <button class="theme-btn" onclick="toggleTheme()">🌙</button>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </div>

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="hamburger" onclick="toggleDrawer()">☰</button>
        <div class="role-badge" id="role-badge"></div>
      </div>
      <div class="topbar-right">
        <span class="topbar-date" id="topbar-date"></span>
      </div>
    </div>

    <div class="content">
  <div class="page-header">
    <div class="page-title"><i class="bi bi-file-text"></i> Prescriptions</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <div class="filter-tabs" id="rx-filter">
        <button class="filter-tab active" onclick="setRxFilter('all',this)">All</button>
        <button class="filter-tab" onclick="setRxFilter('pending',this)">Pending</button>
        <button class="filter-tab" onclick="setRxFilter('dispensed',this)">Dispensed</button>
      </div>
      <button class="btn btn-primary" onclick="openModal('rx-modal')">+ Add Prescription</button>
    </div>
  </div>

  <div class="rx-grid" id="rx-grid">
    <div class="skeleton" style="height:160px;"></div>
    <div class="skeleton" style="height:160px;"></div>
  </div>
    </div> <!-- .content -->

    <footer>
      <span>© 2026 Ruhena Healthcare Limited</span>
      <span>Firebase + Vercel · v3.0</span>
    </footer>
  </div> <!-- .main-content -->
</div> <!-- .page-wrap -->

<!-- Modal -->
<div class="modal-overlay" id="rx-modal">
  <div class="modal">
    <div class="modal-title">New Prescription</div>
    <div class="form-row form-row-2">
      <div class="form-group"><label class="form-label">Patient Name *</label><input class="form-input" id="rx-patient"></div>
      <div class="form-group"><label class="form-label">Doctor Name</label><input class="form-input" id="rx-doctor"></div>
    </div>
    <div class="form-group"><label class="form-label">Medicines *</label><textarea class="form-input" id="rx-meds" rows="4" placeholder="1. Paracetamol 500mg — 1 tab x 3 times daily&#10;2. Amoxicillin 250mg — 1 cap x 2 times daily"></textarea></div>
    <div class="form-row form-row-2">
      <div class="form-group"><label class="form-label">Patient Phone</label><input class="form-input" id="rx-phone" placeholder="+254 7XX XXX XXX"></div>
      <div class="form-group"><label class="form-label">Notes</label><input class="form-input" id="rx-notes" placeholder="e.g. Take with food"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('rx-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="savePrescription()">Save Prescription</button>
    </div>
  </div>
</div>



<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="shared.js"></script>
<script>
const session = requireAuth();
applyTheme();
buildDrawerNav('prescriptions');

let prescriptions = [];
let rxFilter = 'all';

async function loadData() {
  prescriptions = await sbFetch('prescriptions?order=created_at.desc&limit=500').catch(() => []);
  render();
}

function setRxFilter(f, btn) {
  rxFilter = f;
  document.querySelectorAll('#rx-filter .filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const el = document.getElementById('rx-grid');
  let data = prescriptions;
  if (rxFilter !== 'all') data = data.filter(r => r.status === rxFilter);
  if (!data.length) { el.innerHTML = '<div class="empty" style="grid-column:1/-1;"><span class="empty-icon">📋</span><p>No prescriptions found</p></div>'; return; }
  el.innerHTML = data.map(r => `<div class="rx-card">
    <div class="rx-header">
      <div>
        <div class="rx-patient">${r.patient}</div>
        <div class="rx-doctor">${r.doctor ? 'Dr. ' + r.doctor : 'Self-prescribed'}</div>
      </div>
      <span class="badge ${r.status === 'dispensed' ? 'bg-green' : 'bg-amber'}">${r.status || 'pending'}</span>
    </div>
    <div class="rx-meds">${(r.medicines || '').replace(/\n/g, '<br>')}</div>
    <div class="rx-footer">
      <div>
        <div class="rx-date">${r.created_at ? fmtDate(r.created_at.slice(0,10)) : '—'}</div>
        <div style="font-size:11px;color:var(--text3);">${r.phone || ''}</div>
      </div>
      <div style="display:flex;gap:6px;">
        ${r.status !== 'dispensed' ? `<button class="btn btn-sm btn-green" onclick="dispense('${r.id}')">💊 Dispense</button>` : ''}
        <button class="btn btn-sm btn-danger" onclick="deleteRx('${r.id}')">🗑️</button>
      </div>
    </div>
  </div>`).join('');
}

async function savePrescription() {
  const patient = document.getElementById('rx-patient').value.trim();
  const medicines = document.getElementById('rx-meds').value.trim();
  if (!patient || !medicines) { toast('Patient and medicines required', 'error'); return; }
  try {
    await sbInsert('prescriptions', {
      id: uid(), patient, medicines,
      doctor: document.getElementById('rx-doctor').value.trim(),
      phone: document.getElementById('rx-phone').value.trim(),
      notes: document.getElementById('rx-notes').value.trim(),
      status: 'pending', created_at: new Date().toISOString()
    });
    toast('Prescription saved', 'success');
    closeModal('rx-modal');
    document.querySelectorAll('#rx-modal .form-input').forEach(i => i.value = '');
    loadData();
  } catch(e) { toast(e.message, 'error'); }
}

async function dispense(id) {
  try { await sbUpdate('prescriptions', id, { status: 'dispensed' }); toast('Dispensed', 'success'); loadData(); }
  catch(e) { toast(e.message, 'error'); }
}

async function deleteRx(id) {
  if (!confirm('Delete this prescription?')) return;
  try { await sbDelete('prescriptions', id); toast('Deleted', 'success'); loadData(); }
  catch(e) { toast(e.message, 'error'); }
}

loadData();
</script>
</body>
</html>
