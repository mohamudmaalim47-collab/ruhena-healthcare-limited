<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suppliers — Ruhena Healthcare</title>
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page-wrap">
  <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="drawer-logo">💊</div>
      <div class="drawer-brand">Ruhena <span>Healthcare</span></div>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-user">
      <div class="drawer-user-avatar" id="drawer-avatar">A</div>
      <div class="drawer-user-info">
        <div class="drawer-user-name" id="drawer-name">Admin</div>
        <div class="drawer-user-role" id="drawer-role">Owner</div>
      </div>
    </div>
    <div class="drawer-nav" id="drawer-nav"></div>
    <div class="drawer-footer">
      <button class="theme-btn" onclick="toggleTheme()">🌙</button>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </div>

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="hamburger" onclick="toggleDrawer()">☰</button>
        <div class="role-badge" id="role-badge"></div>
      </div>
      <div class="topbar-right">
        <span class="topbar-date" id="topbar-date"></span>
      </div>
    </div>

    <div class="content">
  <div class="page-header">
    <div class="page-title">🏢 Suppliers</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="search-input" placeholder="Search suppliers..." oninput="filterTable()" id="search-input">
      </div>
      <button class="btn btn-primary" onclick="openModal('supplier-modal')">+ Add Supplier</button>
    </div>
  </div>

  <div class="glass-card">
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Name</th><th>Contact Person</th><th>Phone</th><th>Email</th><th>KRA PIN</th><th>Lead Time</th><th>Status</th><th></th></tr></thead>
        <tbody id="suppliers-body"></tbody>
      </table>
    </div>
  </div>
    </div>

<!-- Modal -->
<div class="modal-overlay" id="supplier-modal">
  <div class="modal">
    <div class="modal-title">Add Supplier</div>
    <div class="form-row form-row-2">
      <div class="form-group"><label class="form-label">Name *</label><input class="form-input" id="s-name"></div>
      <div class="form-group"><label class="form-label">Contact Person</label><input class="form-input" id="s-contact"></div>
    </div>
    <div class="form-row form-row-2">
      <div class="form-group"><label class="form-label">Phone *</label><input class="form-input" id="s-phone" placeholder="+254 7XX XXX XXX"></div>
      <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" id="s-email"></div>
    </div>
    <div class="form-row form-row-2">
      <div class="form-group"><label class="form-label">KRA PIN</label><input class="form-input" id="s-kra" placeholder="A001234567B"></div>
      <div class="form-group"><label class="form-label">Lead Time (days)</label><input class="form-input" type="number" id="s-lead" value="3"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('supplier-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveSupplier()">Save Supplier</button>
    </div>
  </div>
</div>

    <footer><span>© 2026 Ruhena Healthcare Limited</span><span>Firebase + Vercel · v3.0</span></footer>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="shared.js"></script>
<script>
const session = requireAuth();
applyTheme();
buildDrawerNav('suppliers');

let suppliers = [];

async function loadData() {
  suppliers = await sbFetch('suppliers?order=name.asc&limit=500').catch(() => []);
  renderTable();
}

function renderTable() {
  const q = (document.getElementById('search-input')?.value || '').toLowerCase();
  const data = suppliers.filter(s => !q || s.name?.toLowerCase().includes(q) || s.contact?.toLowerCase().includes(q) || s.phone?.includes(q));
  const body = document.getElementById('suppliers-body');
  if (!data.length) { body.innerHTML = '<tr><td colspan="8"><div class="empty"><span class="empty-icon">🏢</span><p>No suppliers found</p></div></td></tr>'; return; }
  body.innerHTML = data.map(s => `<tr>
    <td><strong>${s.name}</strong></td>
    <td>${s.contact || '—'}</td>
    <td>${s.phone || '—'}</td>
    <td>${s.email || '—'}</td>
    <td style="font-family:monospace;font-size:12px;">${s.kra_pin || '—'}</td>
    <td>${s.lead_time || '—'} days</td>
    <td><span class="badge ${s.active !== false ? 'bg-green' : 'bg-red'}">${s.active !== false ? 'Active' : 'Inactive'}</span></td>
    <td><button class="btn btn-sm btn-danger" onclick="deleteSupplier('${s.id}')">🗑️</button></td>
  </tr>`).join('');
}

function filterTable() { renderTable(); }

async function saveSupplier() {
  const name = document.getElementById('s-name').value.trim();
  const phone = document.getElementById('s-phone').value.trim();
  if (!name || !phone) { toast('Name and phone are required', 'error'); return; }
  try {
    await sbInsert('suppliers', {
      id: uid(), name, phone,
      contact: document.getElementById('s-contact').value.trim(),
      email: document.getElementById('s-email').value.trim(),
      kra_pin: document.getElementById('s-kra').value.trim(),
      lead_time: parseInt(document.getElementById('s-lead').value) || 3,
      active: true
    });
    toast('Supplier added', 'success');
    closeModal('supplier-modal');
    document.querySelectorAll('#supplier-modal .form-input').forEach(i => i.value = '');
    loadData();
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteSupplier(id) {
  if (!confirm('Delete this supplier?')) return;
  try { await sbDelete('suppliers', id); toast('Deleted', 'success'); loadData(); }
  catch(e) { toast(e.message, 'error'); }
}

loadData();
</script>
</body>
</html>
