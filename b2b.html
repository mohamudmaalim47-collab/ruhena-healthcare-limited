<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B2B Wholesale — Ruhena Healthcare</title>
<link rel="stylesheet" href="shared.css">
<style>
.customer-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; margin-bottom: 20px; }
.customer-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 18px; }
.customer-card h3 { font-size: 15px; margin-bottom: 8px; }
.customer-card p { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.customer-card .balance { font-size: 18px; font-weight: 700; color: var(--red); margin: 10px 0; }
.customer-card .balance.zero { color: var(--green); }
.card-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left"><div class="brand">Ruhena <span>Healthcare</span></div><div class="role-badge" id="role-badge"></div></div>
  <div class="topbar-right"><span class="topbar-date" id="topbar-date"></span><button class="theme-btn" onclick="toggleTheme()">🌙</button><button class="btn-logout" onclick="logout()">Sign Out</button></div>
</div>
<div class="nav-tabs" id="nav-tabs"></div>

<div class="content">
  <div class="filter-tabs" style="margin-bottom:20px;">
    <button class="filter-tab active" id="tab-customers" onclick="switchTab('customers')">🏢 Customers</button>
    <button class="filter-tab" id="tab-orders" onclick="switchTab('orders')">📋 Order History</button>
  </div>

  <!-- CUSTOMERS TAB -->
  <div id="section-customers">
    <div class="page-header">
      <div class="page-title">Wholesale Customers</div>
      <div style="display:flex;gap:10px;">
        <div class="search-wrap">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 20 20"><circle cx="9" cy="9" r="6"/><path d="M15 15l3 3"/></svg>
          <input class="search-input" id="cust-search" placeholder="Search..." oninput="renderCustomers()">
        </div>
        <button class="btn btn-primary" id="btn-add-cust" onclick="openModal('modal-add-customer')">+ Add Customer</button>
      </div>
    </div>
    <div class="customer-cards" id="customer-cards"></div>
  </div>

  <!-- ORDERS TAB -->
  <div id="section-orders" style="display:none;">
    <div class="page-header">
      <div class="page-title">Order History</div>
      <select class="date-filter" id="history-customer" onchange="renderOrderHistory()" style="width:220px;">
        <option value="">Select customer...</option>
      </select>
    </div>
    <div class="card">
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Invoice #</th><th>Date</th><th>Items</th><th>Subtotal</th><th>Prev Balance</th><th>Total</th><th>Paid</th><th>Balance Due</th><th>Status</th></tr></thead>
          <tbody id="history-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<footer><span>© 2026 Ruhena Healthcare Limited</span><span>v2.0</span></footer>

<!-- ADD CUSTOMER -->
<div class="modal-overlay" id="modal-add-customer">
  <div class="modal" style="width:520px;">
    <div class="modal-title">Add B2B Customer</div>
    <div class="form-group"><label class="form-label">Business Name *</label><input class="form-input" id="bc-name" placeholder="e.g. Hassan Medical Store"></div>
    <div class="form-row form-row-2">
      <div class="form-group"><label class="form-label">Phone *</label><input class="form-input" id="bc-phone" placeholder="07xx xxx xxx"></div>
      <div class="form-group"><label class="form-label">Contact Person</label><input class="form-input" id="bc-contact" placeholder="Name"></div>
    </div>
    <div class="form-row form-row-2">
      <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="bc-email" placeholder="email@business.com"></div>
      <div class="form-group"><label class="form-label">Address</label><input class="form-input" id="bc-address" placeholder="Location"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-add-customer')">Cancel</button>
      <button class="btn btn-primary" onclick="saveCustomer()">Save Customer</button>
    </div>
  </div>
</div>

<!-- NEW ORDER MODAL -->
<div class="modal-overlay" id="modal-order">
  <div class="modal" style="width:800px;max-width:96vw;">
    <div class="modal-title">Create Customer Order</div>
    <div class="form-group"><label class="form-label">Customer *</label>
      <select class="form-input" id="order-customer" onchange="updateBalance()">
        <option value="">Select customer...</option>
      </select>
    </div>
    <div id="balance-info" style="background:var(--surface2);border-radius:var(--r-sm);padding:10px 14px;margin-bottom:12px;font-size:13px;display:none;"></div>
    <div class="form-row form-row-2">
      <div class="form-group"><label class="form-label">Invoice Number *</label><input class="form-input" id="order-invoice" placeholder="e.g. INV-001"></div>
      <div class="form-group"><label class="form-label">Date *</label><input class="form-input" type="date" id="order-date"></div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin:14px 0 8px;">
      <label class="form-label" style="margin:0;font-weight:600;color:var(--text);">Order Items *</label>
      <button type="button" class="btn btn-ghost btn-sm" onclick="addB2bRow()">+ Add Row</button>
    </div>
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;margin-bottom:10px;">
      <div style="display:grid;grid-template-columns:2fr 80px 100px 100px 32px;padding:7px 10px;background:var(--surface3);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);">
        <span>Medicine</span><span>Qty</span><span>Price/Unit</span><span>Subtotal</span><span></span>
      </div>
      <div id="b2b-rows"></div>
    </div>
    <div style="text-align:right;font-size:13px;line-height:2;">
      <div>Items Total: <strong>KSh <span id="b2b-items-total">0</span></strong></div>
      <div id="b2b-prev-line" style="display:none;color:var(--red);">Previous Balance: <strong>KSh <span id="b2b-prev-balance">0</span></strong></div>
      <div style="font-size:15px;">Grand Total: <strong style="color:var(--green);">KSh <span id="b2b-grand-total">0</span></strong></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-order')">Cancel</button>
      <button class="btn btn-primary" onclick="saveB2bOrder()">Save Order</button>
    </div>
  </div>
</div>

<!-- PAYMENT MODAL -->
<div class="modal-overlay" id="modal-b2b-pay">
  <div class="modal" style="width:380px;">
    <div class="modal-title">Record Payment</div>
    <div id="b2b-pay-info" style="background:var(--surface2);border-radius:var(--r-sm);padding:12px;margin-bottom:16px;font-size:13px;color:var(--text2);line-height:1.8;"></div>
    <div class="form-group"><label class="form-label">Payment Amount (KSh) *</label><input class="form-input" type="number" id="b2b-pay-amount" placeholder="0"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-b2b-pay')">Cancel</button>
      <button class="btn btn-primary" onclick="recordB2bPayment()">Confirm</button>
    </div>
  </div>
</div>

<datalist id="med-list-b2b"></datalist>

<script src="shared.js"></script>
<script>
requireAuth(); applyTheme(); buildNav('b2b');
let customers = [], b2bOrders = [], inventory = [], b2bRowCount = 0, payCustomerId = null;

async function init() {
  [customers, b2bOrders, inventory] = await Promise.all([
    sbFetch('b2b_customers?order=created_at.desc&limit=500').catch(() => []),
    sbFetch('b2b_orders?order=date.desc&limit=1000').catch(() => []),
    sbFetch('inventory?order=name.asc&limit=2000')
  ]);
  document.getElementById('med-list-b2b').innerHTML = inventory.map(i => `<option value="${i.name}">`).join('');
  populateCustomerSelects();
  renderCustomers();
  if (isOwner()) document.getElementById('btn-add-cust').style.display = 'none';
}

function switchTab(tab) {
  document.getElementById('section-customers').style.display = tab === 'customers' ? '' : 'none';
  document.getElementById('section-orders').style.display = tab === 'orders' ? '' : 'none';
  document.getElementById('tab-customers').classList.toggle('active', tab === 'customers');
  document.getElementById('tab-orders').classList.toggle('active', tab === 'orders');
}

function populateCustomerSelects() {
  const opts = '<option value="">Select customer...</option>' + customers.map(c => `<option value="${c.id}" data-balance="${c.balance || 0}">${c.business_name}</option>`).join('');
  document.getElementById('order-customer').innerHTML = opts;
  document.getElementById('history-customer').innerHTML = '<option value="">Select customer...</option>' + customers.map(c => `<option value="${c.id}">${c.business_name}</option>`).join('');
}

function renderCustomers() {
  const q = document.getElementById('cust-search').value.toLowerCase();
  let data = [...customers];
  if (q) data = data.filter(c => c.business_name?.toLowerCase().includes(q) || c.phone?.includes(q));
  const container = document.getElementById('customer-cards');
  if (!data.length) { container.innerHTML = '<div class="empty"><div class="empty-icon">🏢</div><p>No customers yet</p></div>'; return; }
  container.innerHTML = data.map(c => `
    <div class="customer-card">
      <h3>${c.business_name}</h3>
      <p>📞 ${c.phone || '—'}</p>
      ${c.contact_person ? `<p>👤 ${c.contact_person}</p>` : ''}
      ${c.address ? `<p>📍 ${c.address}</p>` : ''}
      <div class="balance ${(c.balance || 0) <= 0 ? 'zero' : ''}">${fmtKSh(c.balance || 0)}</div>
      <div style="font-size:11px;color:var(--text3);">Outstanding balance</div>
      <div class="card-actions">
        ${!isOwner() ? `<button class="btn btn-primary btn-sm" onclick="openOrderModal('${c.id}')">+ New Order</button>` : ''}
        <button class="btn btn-ghost btn-sm" onclick="viewHistory('${c.id}')">📋 History</button>
        ${!isOwner() && (c.balance || 0) > 0 ? `<button class="btn btn-ghost btn-sm" onclick="openB2bPayModal('${c.id}')">💳 Pay</button>` : ''}
        ${!isOwner() ? `<button class="btn btn-danger btn-sm" onclick="deleteCustomer('${c.id}')">Del</button>` : ''}
      </div>
    </div>`).join('');
}

function openOrderModal(custId = '') {
  if (isOwner()) { toast('Owners cannot create orders', 'error'); return; }
  document.getElementById('order-date').value = todayStr();
  document.getElementById('order-invoice').value = '';
  document.getElementById('b2b-rows').innerHTML = '';
  b2bRowCount = 0;
  if (custId) document.getElementById('order-customer').value = custId;
  updateBalance();
  addB2bRow();
  openModal('modal-order');
}

function updateBalance() {
  const sel = document.getElementById('order-customer');
  const opt = sel.options[sel.selectedIndex];
  const bal = parseFloat(opt?.dataset?.balance || 0);
  const info = document.getElementById('balance-info');
  const prevLine = document.getElementById('b2b-prev-line');
  if (bal > 0) {
    info.style.display = 'block';
    info.innerHTML = `⚠️ This customer has an outstanding balance of <strong style="color:var(--red)">${fmtKSh(bal)}</strong> which will be added to this order.`;
    prevLine.style.display = 'block';
    document.getElementById('b2b-prev-balance').textContent = bal.toLocaleString();
  } else {
    info.style.display = 'none';
    prevLine.style.display = 'none';
  }
  recalcB2b();
}

function addB2bRow() {
  b2bRowCount++;
  const id = b2bRowCount;
  const row = document.createElement('div');
  row.id = 'b2brow-' + id;
  row.style.cssText = 'display:grid;grid-template-columns:2fr 80px 100px 100px 32px;padding:6px 10px;border-top:1px solid var(--border);align-items:center;gap:4px;';
  row.innerHTML = `
    <input class="form-input" style="font-size:12px;padding:6px 8px;" placeholder="Medicine" list="med-list-b2b" oninput="recalcB2b()">
    <input class="form-input" style="font-size:12px;padding:6px 8px;" type="number" min="0" placeholder="0" oninput="recalcB2b()">
    <input class="form-input" style="font-size:12px;padding:6px 8px;" type="number" min="0" placeholder="0.00" oninput="recalcB2b()">
    <span id="b2bsub-${id}" style="font-size:12px;font-weight:600;color:var(--green);">0</span>
    <button type="button" onclick="document.getElementById('b2brow-${id}').remove();recalcB2b()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;">×</button>`;
  document.getElementById('b2b-rows').appendChild(row);
}

function recalcB2b() {
  let itemsTotal = 0;
  document.querySelectorAll('#b2b-rows > div').forEach(row => {
    const inputs = row.querySelectorAll('input[type="number"]');
    const sub = (parseFloat(inputs[0]?.value) || 0) * (parseFloat(inputs[1]?.value) || 0);
    itemsTotal += sub;
    const el = row.querySelector('[id^="b2bsub-"]');
    if (el) el.textContent = fmtKSh(sub);
  });
  const sel = document.getElementById('order-customer');
  const opt = sel.options[sel.selectedIndex];
  const prevBal = parseFloat(opt?.dataset?.balance || 0);
  document.getElementById('b2b-items-total').textContent = itemsTotal.toLocaleString();
  document.getElementById('b2b-grand-total').textContent = (itemsTotal + prevBal).toLocaleString();
}

async function saveB2bOrder() {
  const session = getSession();
  const custId = document.getElementById('order-customer').value;
  const invoice = document.getElementById('order-invoice').value.trim();
  const date = document.getElementById('order-date').value;
  if (!custId || !invoice || !date) { toast('Fill all required fields', 'error'); return; }
  const dup = b2bOrders.find(o => o.invoice_number === invoice);
  if (dup) { toast('Invoice number already exists', 'error'); return; }
  const items = [];
  document.querySelectorAll('#b2b-rows > div').forEach(row => {
    const allInputs = row.querySelectorAll('input');
    const numInputs = row.querySelectorAll('input[type="number"]');
    const med = allInputs[0]?.value.trim();
    const qty = parseFloat(numInputs[0]?.value) || 0;
    const price = parseFloat(numInputs[1]?.value) || 0;
    if (med && qty > 0 && price > 0) items.push({ med, qty, price, subtotal: qty * price });
  });
  if (!items.length) { toast('Add at least one item', 'error'); return; }
  const cust = customers.find(c => c.id === custId);
  const prevBal = cust?.balance || 0;
  const subtotal = items.reduce((s, i) => s + i.subtotal, 0);
  const total = subtotal + prevBal;
  const order = { id: uid(), customer_id: custId, business_name: cust?.business_name || '', invoice_number: invoice, date, items, subtotal, previous_balance: prevBal, total, amount_paid: 0, balance_due: total, payment_status: 'pending', order_ref: 'B2B-' + Date.now(), added_by: session.name, added_at: new Date().toISOString() };
  await sbInsert('b2b_orders', order);
  b2bOrders.unshift(order);
  await sbUpdate('b2b_customers', custId, { balance: total, total_purchased: (cust.total_purchased || 0) + subtotal });
  cust.balance = total;
  populateCustomerSelects();
  closeModal('modal-order');
  renderCustomers();
  toast('Order created ✅');
}

function viewHistory(custId) {
  switchTab('orders');
  document.getElementById('history-customer').value = custId;
  renderOrderHistory();
}

function renderOrderHistory() {
  const custId = document.getElementById('history-customer').value;
  const body = document.getElementById('history-body');
  if (!custId) { body.innerHTML = '<tr><td colspan="9"><div class="empty">Select a customer</div></td></tr>'; return; }
  const data = b2bOrders.filter(o => o.customer_id === custId).sort((a, b) => b.date > a.date ? 1 : -1);
  if (!data.length) { body.innerHTML = '<tr><td colspan="9"><div class="empty">No orders yet</div></td></tr>'; return; }
  body.innerHTML = data.map(o => {
    const items = Array.isArray(o.items) ? o.items : JSON.parse(o.items || '[]');
    const itemSummary = items.map(i => `${i.med || i.name} x${i.qty}`).join(', ');
    return `<tr>
      <td><strong>${o.invoice_number}</strong></td>
      <td style="font-size:12px">${fmtDate(o.date)}</td>
      <td style="font-size:12px;max-width:160px;">${itemSummary}</td>
      <td>${fmtKSh(o.subtotal)}</td>
      <td class="${(o.previous_balance || 0) > 0 ? 'profit-neg' : ''}">${fmtKSh(o.previous_balance || 0)}</td>
      <td><strong>${fmtKSh(o.total)}</strong></td>
      <td class="profit-pos">${fmtKSh(o.amount_paid || 0)}</td>
      <td class="${(o.balance_due || 0) > 0 ? 'profit-neg' : 'profit-pos'}">${fmtKSh(o.balance_due || 0)}</td>
      <td><span class="badge ${o.payment_status === 'paid' ? 'bg-green' : 'bg-amber'}">${o.payment_status}</span></td>
    </tr>`;
  }).join('');
}

function openB2bPayModal(custId) {
  payCustomerId = custId;
  const cust = customers.find(c => c.id === custId);
  document.getElementById('b2b-pay-info').innerHTML = `<strong>${cust.business_name}</strong><br>Outstanding: <strong style="color:var(--red)">${fmtKSh(cust.balance || 0)}</strong>`;
  document.getElementById('b2b-pay-amount').value = '';
  openModal('modal-b2b-pay');
}

async function recordB2bPayment() {
  const amt = parseFloat(document.getElementById('b2b-pay-amount').value) || 0;
  if (amt <= 0) { toast('Enter valid amount', 'error'); return; }
  const cust = customers.find(c => c.id === payCustomerId);
  const newBalance = Math.max(0, (cust.balance || 0) - amt);
  await sbUpdate('b2b_customers', payCustomerId, { balance: newBalance });
  cust.balance = newBalance;
  closeModal('modal-b2b-pay');
  renderCustomers();
  toast('Payment recorded ✅');
}

async function saveCustomer() {
  if (isOwner()) { toast('Owners cannot add customers', 'error'); return; }
  const name = document.getElementById('bc-name').value.trim();
  const phone = document.getElementById('bc-phone').value.trim();
  if (!name || !phone) { toast('Name and phone required', 'error'); return; }
  const cust = { id: uid(), business_name: name, phone, contact_person: document.getElementById('bc-contact').value.trim(), email: document.getElementById('bc-email').value.trim(), address: document.getElementById('bc-address').value.trim(), balance: 0, total_purchased: 0, created_at: new Date().toISOString() };
  await sbInsert('b2b_customers', cust);
  customers.unshift(cust);
  ['bc-name','bc-phone','bc-contact','bc-email','bc-address'].forEach(id => document.getElementById(id).value = '');
  closeModal('modal-add-customer');
  populateCustomerSelects();
  renderCustomers();
  toast('Customer added ✅');
}

async function deleteCustomer(id) {
  if (!confirm('Delete this customer?')) return;
  await sbDelete('b2b_customers', id);
  customers = customers.filter(c => c.id !== id);
  populateCustomerSelects();
  renderCustomers();
  toast('Deleted');
}

init();
</script>
</body>
</html>
