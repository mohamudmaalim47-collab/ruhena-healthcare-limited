<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Sales — Ruhena Healthcare</title>
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page-wrap">
  <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="drawer-logo"><i class="bi bi-capsule"></i></div>
      <div class="drawer-brand">Ruhena <span>Healthcare</span></div>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-user">
      <div class="drawer-user-avatar" id="drawer-avatar">A</div>
      <div class="drawer-user-info">
        <div class="drawer-user-name" id="drawer-name">Admin</div>
        <div class="drawer-user-role" id="drawer-role">Owner</div>
      </div>
    </div>
    <div class="drawer-nav" id="drawer-nav"></div>
    <div class="drawer-footer">
      <button class="theme-btn" onclick="toggleTheme()">🌙</button>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </div>

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="hamburger" onclick="toggleDrawer()">☰</button>
        <div class="role-badge" id="role-badge"></div>
      </div>
      <div class="topbar-right">
        <span class="topbar-date" id="topbar-date"></span>
      </div>
    </div>

    <div class="content">
  <div class="page-header">
    <div class="page-title"><i class="bi bi-currency-exchange"></i> Daily Sales</div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
      <input type="date" class="date-filter" id="date-filter">
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('date-filter').value='';renderTable()">All</button>
      <select class="date-filter" id="pm-filter" onchange="renderTable()" style="width:130px;">
        <option value="">All Payments</option>
        <option value="M">M-Pesa</option>
        <option value="C">Cash</option>
        <option value="D">Debt</option>
        <option value="A">Account</option>
      </select>
      <div class="search-wrap">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 20 20"><circle cx="9" cy="9" r="6"/><path d="M15 15l3 3"/></svg>
        <input class="search-input" id="search" placeholder="Search medicine..." oninput="renderTable()">
      </div>
      <button class="btn btn-primary" id="btn-add" onclick="openAddModal()">+ Add Sale</button>
    </div>
  </div>

  <!-- SUMMARY BAR -->
  <div class="card" style="margin-bottom:16px;">
    <div id="summary-bar" style="display:flex;gap:20px;flex-wrap:wrap;font-size:13px;"></div>
  </div>

  <!-- TABLE -->
  <div class="card">
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>#</th><th>Date</th><th>Medicine</th><th>Qty</th><th>Unit Price</th><th>Total</th><th>Payment</th><th>Added By</th><th id="action-col"></th></tr></thead>
        <tbody id="sales-body"></tbody>
      </table>
    </div>
  </div>
    </div> <!-- .content -->

    <footer>
      <span>© 2026 Ruhena Healthcare Limited</span>
      <span>Firebase + Vercel · v3.0</span>
    </footer>
  </div> <!-- .main-content -->
</div> <!-- .page-wrap -->

<!-- ADD SALE MODAL -->
<div class="modal-overlay" id="modal-sale">
  <div class="modal">
    <div class="modal-title">Record Sale</div>
    <div class="form-row form-row-2">
      <div class="form-group"><label class="form-label">Date *</label><input class="form-input" type="date" id="sl-date"></div>
      <div class="form-group"><label class="form-label">Medicine *</label><input class="form-input" id="sl-medicine" placeholder="Type medicine name..." list="med-list" oninput="onMedicineInput()" autocomplete="off"><datalist id="med-list"></datalist></div>
    </div>
    <div id="stock-status" style="display:none;border-radius:var(--r-sm);padding:10px 14px;margin-bottom:12px;font-size:13px;border:1px solid var(--border);"></div>
    <div class="form-row form-row-3">
      <div class="form-group"><label class="form-label">Qty *</label><input class="form-input" type="number" id="sl-qty" min="1" placeholder="0" oninput="calcTotal()"></div>
      <div class="form-group"><label class="form-label">Unit Price (KSh) *</label><input class="form-input" type="number" id="sl-price" min="0" placeholder="0" oninput="calcTotal()"></div>
      <div class="form-group"><label class="form-label">Total</label><input class="form-input" id="sl-total" readonly style="background:var(--surface3);"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Payment Method *</label>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;"><input type="radio" name="pm" value="M" checked> <span class="badge pm-M">M-Pesa</span></label>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;"><input type="radio" name="pm" value="C"> <span class="badge pm-C">Cash</span></label>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;"><input type="radio" name="pm" value="D"> <span class="badge pm-D">Debt</span></label>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;"><input type="radio" name="pm" value="A"> <span class="badge pm-A">Account</span></label>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Notes</label><input class="form-input" id="sl-notes" placeholder="Optional remarks..."></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-sale')">Cancel</button>
      <button class="btn btn-primary" id="sl-save" onclick="saveSale()">Save Sale</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="shared.js"></script>
<script>
requireAuth(); applyTheme(); buildDrawerNav('sales');
let sales = [], inventory = [];

async function init() {
  [sales, inventory] = await Promise.all([
    sbFetch('sales?order=date.desc&limit=2000'),
    sbFetch('inventory?order=name.asc&limit=2000')
  ]);
  document.getElementById('date-filter').value = todayStr();
  populateMedList();
  renderTable();
  if (isOwner()) {
    document.getElementById('btn-add').style.display = 'none';
    document.getElementById('action-col').textContent = '';
  }
}

function populateMedList() {
  document.getElementById('med-list').innerHTML = inventory.map(i => `<option value="${i.name}">`).join('');
}

function renderTable() {
  const dateF = document.getElementById('date-filter').value;
  const pmF = document.getElementById('pm-filter').value;
  const q = document.getElementById('search').value.toLowerCase();
  let data = [...sales];
  if (dateF) data = data.filter(s => s.date === dateF);
  if (pmF) data = data.filter(s => s.pm === pmF);
  if (q) data = data.filter(s => s.medicine?.toLowerCase().includes(q));
  data.sort((a, b) => a.date < b.date ? 1 : -1);

  const totals = { M: 0, C: 0, D: 0, A: 0 };
  data.forEach(s => { totals[s.pm] = (totals[s.pm] || 0) + s.total; });
  const grand = data.reduce((s, x) => s + x.total, 0);
  document.getElementById('summary-bar').innerHTML =
    `<span style="font-weight:600">${fmtKSh(grand)}</span>` +
    Object.entries(totals).filter(([, v]) => v > 0).map(([k, v]) =>
      `<span><span class="badge pm-${k}">${k}</span> ${fmtKSh(v)}</span>`).join('') +
    `<span style="color:var(--text3)">${data.length} entries</span>`;

  const body = document.getElementById('sales-body');
  if (!data.length) { body.innerHTML = '<tr><td colspan="9"><div class="empty"><div class="empty-icon">💊</div><p>No sales found</p></div></td></tr>'; return; }
  body.innerHTML = data.map((s, i) => `<tr>
    <td class="num-col">${i + 1}</td>
    <td style="font-size:12px;color:var(--text2)">${fmtDate(s.date)}</td>
    <td><strong>${s.medicine}</strong>${s.notes ? `<br><small style="color:var(--text3)">${s.notes}</small>` : ''}</td>
    <td>${s.qty}</td>
    <td>${fmtKSh(s.price)}</td>
    <td><strong>${fmtKSh(s.total)}</strong></td>
    <td><span class="badge pm-${s.pm}">${s.pm === 'M' ? 'M-Pesa' : s.pm === 'C' ? 'Cash' : s.pm === 'D' ? 'Debt' : 'Account'}</span></td>
    <td style="font-size:12px;color:var(--text2)">${s.added_by || ''}</td>
    <td>${!isOwner() ? `<button class="btn btn-danger btn-sm" onclick="deleteSale('${s.id}')">Del</button>` : ''}</td>
  </tr>`).join('');
}

function openAddModal() {
  if (isOwner()) { toast('Owners cannot add sales', 'error'); return; }
  document.getElementById('sl-date').value = todayStr();
  document.getElementById('sl-medicine').value = '';
  document.getElementById('sl-qty').value = '';
  document.getElementById('sl-price').value = '';
  document.getElementById('sl-total').value = '';
  document.getElementById('sl-notes').value = '';
  document.getElementById('stock-status').style.display = 'none';
  document.getElementById('sl-save').disabled = false;
  document.querySelector('input[name="pm"][value="M"]').checked = true;
  openModal('modal-sale');
}

function calcTotal() {
  const q = parseFloat(document.getElementById('sl-qty').value) || 0;
  const p = parseFloat(document.getElementById('sl-price').value) || 0;
  document.getElementById('sl-total').value = q && p ? fmtKSh(q * p) : '';
}

function onMedicineInput() {
  const name = document.getElementById('sl-medicine').value.trim();
  const panel = document.getElementById('stock-status');
  const saveBtn = document.getElementById('sl-save');
  if (!name) { panel.style.display = 'none'; saveBtn.disabled = false; return; }
  const item = inventory.find(x => x.name.toLowerCase() === name.toLowerCase());
  if (!item) {
    panel.style.display = 'block'; panel.style.background = 'var(--red-bg)'; panel.style.borderColor = 'rgba(239,68,68,.3)';
    panel.innerHTML = `<strong style="color:var(--red)">❌ Not in Inventory</strong> — Add it to inventory first.`;
    saveBtn.disabled = true; saveBtn.style.opacity = '0.5';
    document.getElementById('sl-price').value = ''; return;
  }
  document.getElementById('sl-price').value = item.price; calcTotal();
  if (item.stock <= 0) {
    panel.style.display = 'block'; panel.style.background = 'var(--red-bg)'; panel.style.borderColor = 'rgba(239,68,68,.3)';
    panel.innerHTML = `<strong style="color:var(--red)">🔴 Out of Stock</strong> — 0 pcs available.`;
    saveBtn.disabled = true; saveBtn.style.opacity = '0.5';
  } else if (item.stock <= item.alert_at) {
    panel.style.display = 'block'; panel.style.background = 'var(--amber-bg)'; panel.style.borderColor = 'rgba(245,158,11,.3)';
    panel.innerHTML = `<strong style="color:var(--amber)">⚠️ Low Stock</strong> — ${item.stock} pcs left · Price: KSh ${item.price}`;
    saveBtn.disabled = false; saveBtn.style.opacity = '1';
  } else {
    panel.style.display = 'block'; panel.style.background = 'var(--green-bg)'; panel.style.borderColor = 'rgba(34,197,94,.3)';
    panel.innerHTML = `<strong style="color:var(--green)">✅ In Stock</strong> — ${item.stock} pcs · Price: KSh ${item.price}`;
    saveBtn.disabled = false; saveBtn.style.opacity = '1';
  }
}

async function saveSale() {
  const session = getSession();
  const medicine = document.getElementById('sl-medicine').value.trim();
  const qty = parseInt(document.getElementById('sl-qty').value) || 0;
  const price = parseFloat(document.getElementById('sl-price').value) || 0;
  const date = document.getElementById('sl-date').value;
  const pm = document.querySelector('input[name="pm"]:checked')?.value || 'C';
  if (!medicine || !qty || !price || !date) { toast('Fill all required fields', 'error'); return; }
  const inv = inventory.find(x => x.name.toLowerCase() === medicine.toLowerCase());
  if (!inv) { toast('Medicine not in inventory', 'error'); return; }
  if (inv.stock <= 0) { toast('Out of stock — cannot sell', 'error'); return; }
  if (qty > inv.stock) { toast(`Only ${inv.stock} pcs available`, 'error'); return; }

  const sale = { id: uid(), date, medicine, qty, price, total: qty * price, pm, notes: document.getElementById('sl-notes').value.trim(), added_by: session.name, added_at: new Date().toISOString() };
  await sbInsert('sales', sale);
  await sbUpdate('inventory', inv.id, { stock: inv.stock - qty });
  inv.stock -= qty;
  sales.unshift(sale);
  closeModal('modal-sale');
  renderTable();
  toast('Sale recorded ✅');
}

async function deleteSale(id) {
  if (!confirm('Delete this sale?')) return;
  await sbDelete('sales', id);
  sales = sales.filter(s => s.id !== id);
  renderTable();
  toast('Sale deleted');
}

init();
</script>
</body>
</html>
