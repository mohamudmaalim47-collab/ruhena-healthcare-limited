<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS — Ruhena Healthcare</title>
<link rel="stylesheet" href="shared.css">
<style>
  .pos-layout{display:grid;grid-template-columns:1fr 380px;gap:20px;align-items:start;}
  .pos-search{position:relative;}
  .pos-search input{width:100%;padding:14px 16px 14px 44px;font-size:16px;border:2px solid var(--border);border-radius:var(--r-lg);background:var(--surface);color:var(--text);font-family:var(--font);outline:none;transition:all .2s;}
  .pos-search input:focus{border-color:var(--p-500);box-shadow:0 0 0 4px rgba(14,165,233,0.1);}
  .pos-search .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:20px;color:var(--text3);}
  .product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-top:16px;max-height:520px;overflow-y:auto;padding:4px;}
  .product-card{border:1px solid var(--border);border-radius:var(--r-sm);padding:14px;cursor:pointer;transition:all .2s;background:var(--surface);text-align:center;}
  .product-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--p-400);}
  .product-card .p-name{font-size:13px;font-weight:600;margin-bottom:4px;}
  .product-card .p-price{font-size:15px;font-weight:700;color:var(--green);}
  .product-card .p-stock{font-size:11px;color:var(--text3);}
  .cart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;position:sticky;top:80px;}
  .cart-items{max-height:360px;overflow-y:auto;margin-bottom:16px;}
  .cart-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .cart-item .ci-info{flex:1;}
  .cart-item .ci-name{font-weight:600;}
  .cart-item .ci-qty{display:flex;align-items:center;gap:8px;margin-top:4px;}
  .cart-item .ci-qty button{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-size:14px;font-weight:700;color:var(--text);}
  .cart-item .ci-qty button:hover{background:var(--surface3);}
  .cart-item .ci-total{font-weight:700;font-size:14px;color:var(--green);}
  .cart-item .ci-remove{cursor:pointer;color:var(--text3);font-size:18px;padding:4px;}
  .cart-item .ci-remove:hover{color:var(--red);}
  .cart-summary{border-top:2px solid var(--border);padding-top:14px;}
  .cart-row{display:flex;justify-content:space-between;font-size:13px;color:var(--text2);margin-bottom:6px;}
  .cart-row.total{font-size:18px;font-weight:700;color:var(--text);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
  .pay-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px;}
  .pay-btn{padding:12px;border-radius:var(--r-sm);border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600;transition:all .2s;text-align:center;color:var(--text2);}
  .pay-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-sm);}
  .pay-btn.pay-cash{border-color:var(--green);color:var(--green);}
  .pay-btn.pay-cash:hover{background:var(--green-bg);}
  .pay-btn.pay-mpesa{border-color:var(--orange);color:var(--orange);}
  .pay-btn.pay-mpesa:hover{background:var(--orange-bg);}
  .pay-btn.pay-insurance{border-color:var(--purple);color:var(--purple);}
  .pay-btn.pay-insurance:hover{background:var(--purple-bg);}
  .pay-btn.pay-credit{border-color:var(--amber);color:var(--amber);}
  .pay-btn.pay-credit:hover{background:var(--amber-bg);}
  .pay-btn.active{transform:translateY(-2px);box-shadow:var(--shadow);}
  .complete-btn{width:100%;padding:14px;margin-top:12px;font-size:15px;}
  .recent-txns{margin-top:24px;}
  @media(max-width:900px){.pos-layout{grid-template-columns:1fr;}.cart-card{position:static;}}
</style>
</head>
<body>
<div class="page-wrap">
  <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="drawer-logo">💊</div>
      <div class="drawer-brand">Ruhena <span>Healthcare</span></div>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-user">
      <div class="drawer-user-avatar" id="drawer-avatar">A</div>
      <div class="drawer-user-info">
        <div class="drawer-user-name" id="drawer-name">Admin</div>
        <div class="drawer-user-role" id="drawer-role">Owner</div>
      </div>
    </div>
    <div class="drawer-nav" id="drawer-nav"></div>
    <div class="drawer-footer">
      <button class="theme-btn" onclick="toggleTheme()">🌙</button>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </div>

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="hamburger" onclick="toggleDrawer()">☰</button>
        <span class="badge bg-green" style="font-size:12px;">POS</span>
        <div class="role-badge" id="role-badge"></div>
      </div>
      <div class="topbar-right">
        <span class="topbar-date" id="topbar-date"></span>
      </div>
    </div>

    <div class="content">
      <div class="page-header">
        <div class="page-title">💰 Point of Sale</div>
        <span style="font-size:13px;color:var(--text3);">POS #<span id="pos-number">001</span></span>
      </div>

      <div class="pos-layout">
        <div>
          <div class="pos-search">
            <span class="search-icon">🔍</span>
            <input id="search-input" placeholder="Search medicine..." oninput="filterProducts()" autofocus>
          </div>
          <div class="filter-tabs" style="margin-top:12px;" id="category-filters">
            <button class="filter-tab active" data-cat="all" onclick="setCategory('all',this)">All</button>
          </div>
          <div class="product-grid" id="product-grid">
            <div class="skeleton" style="height:100px;"></div>
            <div class="skeleton" style="height:100px;"></div>
            <div class="skeleton" style="height:100px;"></div>
          </div>
        </div>

        <div class="cart-card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
            <h3 style="font-size:15px;font-weight:700;">🛒 Cart</h3>
            <span id="cart-count" style="font-size:12px;color:var(--text3);">0 items</span>
          </div>
          <div class="cart-items" id="cart-items">
            <div class="empty" style="padding:24px;"><span class="empty-icon">🛒</span><p>Cart is empty</p></div>
          </div>
          <div class="cart-summary" id="cart-summary" style="display:none;">
            <div class="cart-row"><span>Subtotal</span><span id="cart-subtotal">KSh 0</span></div>
            <div class="cart-row"><span>Tax (16%)</span><span id="cart-tax">KSh 0</span></div>
            <div class="cart-row total"><span>Total</span><span id="cart-total" style="color:var(--p-600);">KSh 0</span></div>
          </div>
          <div class="pay-btns" id="pay-btns" style="display:none;">
            <button class="pay-btn pay-cash" onclick="setPayment('cash',this)">💵 Cash</button>
            <button class="pay-btn pay-mpesa" onclick="setPayment('mpesa',this)">📱 M-Pesa</button>
            <button class="pay-btn pay-insurance" onclick="setPayment('insurance',this)">🏥 Insurance</button>
            <button class="pay-btn pay-credit" onclick="setPayment('credit',this)">📋 Credit</button>
          </div>
          <button class="btn btn-primary complete-btn" id="complete-btn" style="display:none;" onclick="completeSale()">💊 Complete Sale</button>
        </div>
      </div>

      <div class="glass-card recent-txns">
        <div class="card-title">📋 Recent Transactions</div>
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>#</th><th>Medicine</th><th>Qty</th><th>Total</th><th>Payment</th><th>Time</th></tr></thead>
            <tbody id="recent-txns-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <footer>
      <span>© 2026 Ruhena Healthcare Limited</span>
      <span>Firebase + Vercel · v3.0</span>
    </footer>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="shared.js"></script>
<script>
const session = requireAuth();
applyTheme();
buildDrawerNav('pos');

let inventory = [], sales = [];
let cart = [];
let selectedPayment = '';
let currentCategory = 'all';

async function loadData() {
  const [inv, sls] = await Promise.all([
    sbFetch('inventory?order=name.asc&limit=2000'),
    sbFetch('sales?order=date.desc&limit=500')
  ]);
  inventory = inv;
  sales = sls;
  renderCategories();
  renderProducts();
  renderRecent();
}

function renderCategories() {
  const cats = [...new Set(inventory.map(i => i.category).filter(Boolean))];
  const el = document.getElementById('category-filters');
  cats.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'filter-tab';
    btn.textContent = c;
    btn.dataset.cat = c;
    btn.onclick = function() { setCategory(c, this); };
    el.appendChild(btn);
  });
}

function setCategory(cat, btn) {
  currentCategory = cat;
  document.querySelectorAll('#category-filters .filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderProducts();
}

function filterProducts() { renderProducts(); }

function renderProducts() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  const el = document.getElementById('product-grid');
  let items = inventory.filter(i => i.stock > 0);
  if (currentCategory !== 'all') items = items.filter(i => i.category === currentCategory);
  if (q) items = items.filter(i => i.name?.toLowerCase().includes(q) || i.category?.toLowerCase().includes(q));
  if (!items.length) { el.innerHTML = '<div class="empty" style="grid-column:1/-1;"><span class="empty-icon">💊</span><p>No medicines found</p></div>'; return; }
  el.innerHTML = items.map(i => `<div class="product-card" onclick="addToCart('${i.id}')">
    <div class="p-name">${i.name}</div>
    <div class="p-price">KSh ${Number(i.price).toLocaleString()}</div>
    <div class="p-stock">${i.stock} in stock</div>
  </div>`).join('');
}

function addToCart(id) {
  const item = inventory.find(i => i.id === id);
  if (!item || item.stock <= 0) return toast('Out of stock', 'error');
  const existing = cart.find(c => c.id === id);
  if (existing) {
    if (existing.qty >= item.stock) return toast('Not enough stock', 'error');
    existing.qty++;
  } else {
    cart.push({ id: item.id, name: item.name, price: item.price, qty: 1, stock: item.stock });
  }
  renderCart();
  toast(item.name + ' added', 'success');
}

function removeFromCart(id) { cart = cart.filter(c => c.id !== id); renderCart(); }

function changeQty(id, delta) {
  const c = cart.find(i => i.id === id);
  if (!c) return;
  const item = inventory.find(i => i.id === id);
  c.qty += delta;
  if (c.qty <= 0) { cart = cart.filter(i => i.id !== id); }
  if (c.qty > (item?.stock || 0)) { c.qty = item.stock; toast('Max stock reached', 'warning'); }
  renderCart();
}

function renderCart() {
  const el = document.getElementById('cart-items');
  document.getElementById('cart-count').textContent = cart.length + ' items';
  if (!cart.length) {
    el.innerHTML = '<div class="empty" style="padding:24px;"><span class="empty-icon">🛒</span><p>Cart is empty</p></div>';
    document.getElementById('cart-summary').style.display = 'none';
    document.getElementById('pay-btns').style.display = 'none';
    document.getElementById('complete-btn').style.display = 'none';
    selectedPayment = '';
    return;
  }
  el.innerHTML = cart.map(c => `<div class="cart-item">
    <div class="ci-info">
      <div class="ci-name">${c.name}</div>
      <div class="ci-qty">
        <button onclick="changeQty('${c.id}',-1)">−</button>
        <span style="font-weight:600;min-width:24px;text-align:center;">${c.qty}</span>
        <button onclick="changeQty('${c.id}',1)">+</button>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="ci-total">KSh ${(c.price * c.qty).toLocaleString()}</span>
      <span class="ci-remove" onclick="removeFromCart('${c.id}')">✕</span>
    </div>
  </div>`).join('');
  const sub = cart.reduce((s, c) => s + c.price * c.qty, 0);
  const tax = sub * 0.16;
  document.getElementById('cart-subtotal').textContent = 'KSh ' + sub.toLocaleString();
  document.getElementById('cart-tax').textContent = 'KSh ' + tax.toLocaleString();
  document.getElementById('cart-total').textContent = 'KSh ' + (sub + tax).toLocaleString();
  document.getElementById('cart-summary').style.display = 'block';
  document.getElementById('pay-btns').style.display = 'grid';
}

function setPayment(method, btn) {
  selectedPayment = method;
  document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('complete-btn').style.display = 'block';
  document.getElementById('complete-btn').textContent =
    method === 'cash' ? '💵 Complete - Cash' :
    method === 'mpesa' ? '📱 Complete - M-Pesa' :
    method === 'insurance' ? '🏥 Complete - Insurance' : '📋 Complete - Credit';
}

async function completeSale() {
  if (!cart.length || !selectedPayment) return toast('Add items and select payment', 'error');
  const btn = document.getElementById('complete-btn');
  btn.disabled = true; btn.textContent = 'Processing...';
  try {
    const sub = cart.reduce((s, c) => s + c.price * c.qty, 0);
    const sale = {
      id: uid(), date: todayStr(),
      medicines: cart.map(c => c.name).join(', '),
      medicine: cart[0].name,
      qty: cart.reduce((s, c) => s + c.qty, 0),
      price: sub / cart.reduce((s, c) => s + c.qty, 0),
      total: sub,
      pm: selectedPayment === 'cash' ? 'C' : selectedPayment === 'mpesa' ? 'M' : selectedPayment === 'insurance' ? 'I' : 'D',
      created_by: session.name,
      added_at: new Date().toISOString()
    };
    await sbInsert('sales', sale);
    for (const c of cart) {
      const inv = inventory.find(i => i.id === c.id);
      if (inv) await sbUpdate('inventory', inv.id, { stock: inv.stock - c.qty });
    }
    toast('Sale completed! KSh ' + sub.toLocaleString(), 'success');
    cart = []; selectedPayment = '';
    renderCart();
    loadData();
    btn.disabled = false; btn.textContent = '💊 Complete Sale';
  } catch(e) {
    toast(e.message, 'error');
    btn.disabled = false; btn.textContent = '💊 Complete Sale';
  }
}

function renderRecent() {
  const body = document.getElementById('recent-txns-body');
  const data = sales.slice(0, 15);
  if (!data.length) { body.innerHTML = '<tr><td colspan="6"><div class="empty"><span class="empty-icon">💊</span><p>No sales yet</p></div></td></tr>'; return; }
  body.innerHTML = data.map((s, i) => `<tr>
    <td class="num-col">${i+1}</td>
    <td><strong>${s.medicine || s.medicines}</strong></td>
    <td>${s.qty}</td>
    <td class="profit-pos">${fmtKSh(s.total)}</td>
    <td><span class="badge ${s.pm === 'M' ? 'bg-green' : s.pm === 'C' ? 'bg-blue' : s.pm === 'I' ? 'bg-purple' : 'bg-amber'}">${s.pm || '—'}</span></td>
    <td style="font-size:12px;color:var(--text3);">${s.date || ''}</td>
  </tr>`).join('');
}

loadData();
</script>
</body>
</html>
