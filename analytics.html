<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics — Ruhena Healthcare</title>
<link rel="stylesheet" href="shared.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  .insight-grid{display:grid;gap:16px;margin-bottom:24px;}
  .insight-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;border-left:4px solid var(--p-500);}
  .insight-card.ai{border-left-color:var(--purple);}
  .insight-card.alert{border-left-color:var(--red);}
  .insight-card.success{border-left-color:var(--green);}
  .insight-card .ic-icon{font-size:24px;margin-bottom:8px;}
  .insight-card .ic-title{font-weight:700;font-size:14px;margin-bottom:4px;}
  .insight-card .ic-body{font-size:13px;color:var(--text2);line-height:1.6;}
  .insight-card .ic-action{margin-top:10px;}
  .analytics-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
  @media(max-width:768px){.analytics-row{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="page-wrap">
  <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="drawer-logo">💊</div>
      <div class="drawer-brand">Ruhena <span>Healthcare</span></div>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-user">
      <div class="drawer-user-avatar" id="drawer-avatar">A</div>
      <div class="drawer-user-info">
        <div class="drawer-user-name" id="drawer-name">Admin</div>
        <div class="drawer-user-role" id="drawer-role">Owner</div>
      </div>
    </div>
    <div class="drawer-nav" id="drawer-nav"></div>
    <div class="drawer-footer">
      <button class="theme-btn" onclick="toggleTheme()">🌙</button>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </div>

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="hamburger" onclick="toggleDrawer()">☰</button>
        <div class="role-badge" id="role-badge"></div>
      </div>
      <div class="topbar-right">
        <span class="topbar-date" id="topbar-date"></span>
      </div>
    </div>

    <div class="content">
  <div class="page-header">
    <div class="page-title">🤖 Analytics & Insights</div>
    <span style="font-size:12px;color:var(--text3);">Powered by data patterns</span>
  </div>

  <div class="insight-grid" id="insights"></div>

  <div class="analytics-row">
    <div class="glass-card">
      <div class="card-title">📊 Top Selling Medicines</div>
      <canvas id="topMedsChart" height="200"></canvas>
    </div>
    <div class="glass-card">
      <div class="card-title">📈 Sales Trend (30 days)</div>
      <canvas id="trendChart" height="200"></canvas>
    </div>
  </div>

  <div class="glass-card">
    <div class="card-title">🏆 Inventory Performance</div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Medicine</th><th>Sold (30d)</th><th>Revenue</th><th>Stock</th><th>Days Left</th><th>Status</th></tr></thead>
        <tbody id="perf-body"></tbody>
      </table>
    </div>
  </div>
</div>

    <footer><span>© 2026 Ruhena Healthcare Limited</span><span>Firebase + Vercel · v3.0</span></footer>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="shared.js"></script>
<script>
const session = requireAuth();
applyTheme();
buildDrawerNav('analytics');

let sales = [], inventory = [];
let trendChart, topChart;

async function loadData() {
  [sales, inventory] = await Promise.all([
    sbFetch('sales?order=date.desc&limit=2000'),
    sbFetch('inventory?order=name.asc&limit=2000')
  ]);
  renderInsights();
  renderTrend();
  renderTopMeds();
  renderPerformance();
}

function renderInsights() {
  const el = document.getElementById('insights');
  const totalSales = sales.reduce((s, x) => s + x.total, 0);
  const monthSales = sales.filter(s => s.date?.startsWith(monthStr()));
  const monthRev = monthSales.reduce((s, x) => s + x.total, 0);
  const lowStock = inventory.filter(i => i.stock > 0 && i.stock <= (i.alert_at || 10));
  const outStock = inventory.filter(i => i.stock <= 0);
  const totalQty = monthSales.reduce((s, x) => s + x.qty, 0);
  const avgTicket = monthSales.length > 0 ? Math.round(monthRev / monthSales.length) : 0;

  // Find top seller
  const medCount = {};
  monthSales.forEach(s => { medCount[s.medicine] = (medCount[s.medicine] || 0) + s.qty; });
  const topSeller = Object.entries(medCount).sort((a, b) => b[1] - a[1])[0];

  el.innerHTML = `
    <div class="insight-card ai">
      <div class="ic-icon">🤖</div>
      <div class="ic-title">AI Demand Insight</div>
      <div class="ic-body">${topSeller ? `<strong>${topSeller[0]}</strong> is your top seller (${topSeller[1]} units this month). Consider increasing stock by 30%.` : 'Not enough sales data yet. Keep selling to unlock AI insights.'}</div>
    </div>
    <div class="insight-card ${lowStock.length ? 'alert' : 'success'}" style="grid-column:1;">
      <div class="ic-icon">${lowStock.length ? '⚠️' : '✅'}</div>
      <div class="ic-title">Stock Health</div>
      <div class="ic-body">${lowStock.length} items low stock · ${outStock.length} out of stock · ${inventory.length - lowStock.length - outStock.length} healthy</div>
      <div class="ic-action"><a href="inventory.html" class="btn btn-sm btn-ghost">Manage Stock →</a></div>
    </div>
    <div class="insight-card">
      <div class="ic-icon">📊</div>
      <div class="ic-title">Monthly Summary</div>
      <div class="ic-body">${monthSales.length} transactions · ${fmtKSh(monthRev)} revenue · Avg ticket ${fmtKSh(avgTicket)}</div>
    </div>`;
}

function renderTrend() {
  const last30 = [];
  for (let i = 29; i >= 0; i--) { const d = new Date(); d.setDate(d.getDate() - i); last30.push(d.toISOString().slice(0, 10)); }
  const byDay = {};
  last30.forEach(d => byDay[d] = 0);
  sales.forEach(s => { if (byDay[s.date] !== undefined) byDay[s.date] += s.total; });

  const dark = document.body.classList.contains('dark-mode');
  if (trendChart) trendChart.destroy();
  trendChart = new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: {
      labels: last30.map((d, i) => i % 5 === 0 ? fmtDate(d) : ''),
      datasets: [{ label: 'Revenue', data: last30.map(d => byDay[d]), borderColor: '#0284C7', backgroundColor: 'rgba(2,132,199,0.08)', fill: true, tension: 0.4, pointRadius: 0, borderWidth: 2 }]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: { legend: { display: false }, tooltip: { backgroundColor: dark ? 'rgba(30,41,59,0.95)' : '#fff', titleColor: dark ? '#F1F5F9' : '#111827', bodyColor: dark ? '#94A3B8' : '#6B7280', borderColor: dark ? '#475569' : '#D1D5DB', borderWidth: 1 } },
      scales: { x: { ticks: { color: dark ? '#94A3B8' : '#6B7280', font: { size: 10 } }, grid: { color: dark ? '#334155' : '#E5E7EB' } }, y: { ticks: { color: dark ? '#94A3B8' : '#6B7280', font: { size: 10 } }, grid: { color: dark ? '#334155' : '#E5E7EB' } } }
    }
  });
}

function renderTopMeds() {
  const medCount = {};
  sales.forEach(s => { medCount[s.medicine] = (medCount[s.medicine] || 0) + s.qty; });
  const top = Object.entries(medCount).sort((a, b) => b[1] - a[1]).slice(0, 10);
  const dark = document.body.classList.contains('dark-mode');
  if (topChart) topChart.destroy();

  if (!top.length) { document.getElementById('topMedsChart').parentElement.innerHTML = '<div class="empty"><span class="empty-icon">📊</span><p>Not enough data</p></div>'; return; }

  topChart = new Chart(document.getElementById('topMedsChart'), {
    type: 'bar',
    data: {
      labels: top.map(t => t[0].length > 15 ? t[0].slice(0, 15) + '...' : t[0]),
      datasets: [{ label: 'Units Sold', data: top.map(t => t[1]), backgroundColor: 'rgba(5,150,105,0.5)', borderColor: '#059669', borderWidth: 1, borderRadius: 4 }]
    },
    options: {
      responsive: true, maintainAspectRatio: true, indexAxis: 'y',
      plugins: { legend: { display: false }, tooltip: { backgroundColor: dark ? 'rgba(30,41,59,0.95)' : '#fff', titleColor: dark ? '#F1F5F9' : '#111827', bodyColor: dark ? '#94A3B8' : '#6B7280' } },
      scales: { x: { ticks: { color: dark ? '#94A3B8' : '#6B7280', font: { size: 10 } }, grid: { color: dark ? '#334155' : '#E5E7EB' } }, y: { ticks: { color: dark ? '#94A3B8' : '#6B7280', font: { size: 10 } }, grid: { display: false } } }
    }
  });
}

function renderPerformance() {
  const el = document.getElementById('perf-body');
  const month = monthStr();
  const medSold = {};
  sales.filter(s => s.date?.startsWith(month)).forEach(s => { medSold[s.medicine] = (medSold[s.medicine] || 0) + s.qty; });
  const data = inventory.map(i => {
    const sold = medSold[i.name] || 0;
    const rev = sales.filter(s => s.medicine === i.name && s.date?.startsWith(month)).reduce((s, x) => s + x.total, 0);
    const daysLeft = sold > 0 ? Math.round(i.stock / (sold / 30)) : 999;
    return { ...i, sold, rev, daysLeft };
  }).sort((a, b) => b.sold - a.sold).slice(0, 30);

  if (!data.length) { el.innerHTML = '<tr><td colspan="6"><div class="empty"><span class="empty-icon">📊</span><p>No data</p></div></td></tr>'; return; }
  el.innerHTML = data.map(i => `<tr>
    <td><strong>${i.name}</strong></td>
    <td>${i.sold}</td>
    <td class="profit-pos">${fmtKSh(i.rev)}</td>
    <td>${i.stock}</td>
    <td>${i.daysLeft >= 999 ? '∞' : i.daysLeft + ' days'}</td>
    <td><span class="badge ${i.stock <= 0 ? 'bg-red' : i.stock <= (i.alert_at || 10) ? 'bg-amber' : 'bg-green'}">${i.stock <= 0 ? 'Out' : i.stock <= (i.alert_at || 10) ? 'Low' : 'Good'}</span></td>
  </tr>`).join('');
}

loadData();
</script>
</body>
</html>
