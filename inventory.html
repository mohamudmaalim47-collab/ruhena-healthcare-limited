<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory — Ruhena Healthcare</title>
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page-wrap">
  <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="drawer-logo"><i class="bi bi-capsule"></i></div>
      <div class="drawer-brand">Ruhena <span>Healthcare</span></div>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-user">
      <div class="drawer-user-avatar" id="drawer-avatar">A</div>
      <div class="drawer-user-info">
        <div class="drawer-user-name" id="drawer-name">Admin</div>
        <div class="drawer-user-role" id="drawer-role">Owner</div>
      </div>
    </div>
    <div class="drawer-nav" id="drawer-nav"></div>
    <div class="drawer-footer">
      <button class="theme-btn" onclick="toggleTheme()">🌙</button>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </div>

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="hamburger" onclick="toggleDrawer()">☰</button>
        <div class="role-badge" id="role-badge"></div>
      </div>
      <div class="topbar-right">
        <span class="topbar-date" id="topbar-date"></span>
      </div>
    </div>

    <div class="content">
      <div class="page-header">
        <div class="page-title"><i class="bi bi-box-seam"></i> Medicine Inventory</div>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
          <select class="form-input" id="cat-filter" onchange="renderTable()" style="width:160px;">
            <option value="">All Categories</option>
            <option>Cardiovascular</option><option>Antibiotic/Antifungal</option><option>Diabetes</option>
            <option>Neurology/Psychiatry</option><option>GI/Gastroenterology</option>
            <option>Dermatology</option><option>Analgesic/Anti-inflammatory</option>
            <option>ENT/Cold & Flu</option><option>Hormones/Gynaecology</option>
            <option>Respiratory</option><option>Haematology/Oncology</option>
            <option>Vitamins/Supplements</option><option>Eye/ENT</option>
            <option>Injectables</option><option>Diagnostics/Devices</option><option>Other</option>
          </select>
          <select class="form-input" id="status-filter" onchange="renderTable()" style="width:130px;">
            <option value="">All Status</option><option value="ok">In Stock</option><option value="low">Low Stock</option><option value="out">Out of Stock</option>
          </select>
          <div class="search-wrap">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 20 20"><circle cx="9" cy="9" r="6"/><path d="M15 15l3 3"/></svg>
            <input class="search-input" id="search" placeholder="Search medicine..." oninput="renderTable()">
          </div>
          <button class="btn btn-primary" id="btn-add" onclick="openModal('modal-add')">+ Add Medicine</button>
        </div>
      </div>

      <div class="stats-grid" style="grid-template-columns:repeat(5,1fr);margin-bottom:20px;" id="inv-stats"></div>

      <div id="low-banner" style="display:none;background:var(--amber-bg);border:1px solid rgba(245,158,11,.3);border-radius:var(--r-sm);padding:10px 16px;margin-bottom:16px;font-size:13px;color:var(--amber);"></div>

      <div class="glass-card">
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>#</th><th>Medicine</th><th>Category</th><th>Stock</th><th>Unit Price</th><th>Alert At</th><th>Status</th><th id="action-col"></th></tr></thead>
            <tbody id="inv-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <footer><span>© 2026 Ruhena Healthcare Limited</span><span>v2.0</span></footer>
  </div>
</div>

<div class="modal-overlay" id="modal-add">
  <div class="modal" style="width:480px;">
    <div class="modal-title">Add Medicine</div>
    <div class="form-group"><label class="form-label">Medicine Name *</label><input class="form-input" id="inv-name" placeholder="e.g. Amoxicillin 500mg"></div>
    <div class="form-row form-row-2">
      <div class="form-group"><label class="form-label">Category</label>
        <select class="form-input" id="inv-cat">
          <option>Cardiovascular</option><option>Antibiotic/Antifungal</option><option>Diabetes</option>
          <option>Neurology/Psychiatry</option><option>GI/Gastroenterology</option>
          <option>Dermatology</option><option>Analgesic/Anti-inflammatory</option>
          <option>ENT/Cold & Flu</option><option>Hormones/Gynaecology</option>
          <option>Respiratory</option><option>Haematology/Oncology</option>
          <option>Vitamins/Supplements</option><option>Eye/ENT</option>
          <option>Injectables</option><option>Diagnostics/Devices</option><option>Other</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Unit Price (KSh) *</label><input class="form-input" type="number" id="inv-price" placeholder="0" min="0"></div>
    </div>
    <div class="form-row form-row-2">
      <div class="form-group"><label class="form-label">Opening Stock *</label><input class="form-input" type="number" id="inv-stock" placeholder="0" min="0"></div>
      <div class="form-group"><label class="form-label">Alert When Stock ≤</label><input class="form-input" type="number" id="inv-alert" placeholder="10" min="1" value="10"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-add')">Cancel</button>
      <button class="btn btn-primary" onclick="saveMedicine()">Save Medicine</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-restock">
  <div class="modal" style="width:380px;">
    <div class="modal-title">Restock Medicine</div>
    <div id="restock-info" style="background:var(--surface2);border-radius:var(--r-sm);padding:12px;margin-bottom:16px;font-size:13px;color:var(--text2);line-height:1.8;"></div>
    <div class="form-group"><label class="form-label">Quantity to Add *</label><input class="form-input" type="number" id="restock-qty" placeholder="0" min="1"></div>
    <div class="form-group"><label class="form-label">Reason</label>
      <select class="form-input" id="restock-reason"><option>New Delivery</option><option>Return</option><option>Correction</option><option>Other</option></select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-restock')">Cancel</button>
      <button class="btn btn-primary" onclick="confirmRestock()">Add Stock</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-edit">
  <div class="modal" style="width:400px;">
    <div class="modal-title">Edit Medicine</div>
    <input type="hidden" id="edit-id">
    <div class="form-group"><label class="form-label">Unit Price (KSh)</label><input class="form-input" type="number" id="edit-price" min="0"></div>
    <div class="form-group"><label class="form-label">Alert Threshold</label><input class="form-input" type="number" id="edit-alert" min="1"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-edit')">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="shared.js"></script>
<script>
requireAuth(); applyTheme(); buildDrawerNav('inventory');
let inventory = [], restockId = null;

async function init() {
  inventory = await sbFetch('inventory?order=name.asc&limit=2000');
  renderStats(); renderTable(); renderLowBanner();
  if (isOwner()) document.getElementById('btn-add').style.display = 'none';
}

function renderStats() {
  const total = inventory.length;
  let costVal = 0, saleVal = 0;
  inventory.forEach(i => { costVal += i.stock * (i.unit_cost || 0); saleVal += i.stock * i.price; });
  const profit = saleVal - costVal;
  const margin = saleVal > 0 ? (profit / saleVal * 100) : 0;
  document.getElementById('inv-stats').innerHTML = `
    <div class="stat-card"><div class="stat-lbl">Total Products</div><div class="stat-val">${total}</div></div>
    <div class="stat-card"><div class="stat-lbl">Total Cost Value</div><div class="stat-val">${fmtKSh(costVal)}</div></div>
    <div class="stat-card"><div class="stat-lbl">Total Sale Value</div><div class="stat-val">${fmtKSh(saleVal)}</div></div>
    <div class="stat-card"><div class="stat-lbl">Potential Profit</div><div class="stat-val">${fmtKSh(profit)}</div></div>
    <div class="stat-card"><div class="stat-lbl">Avg Margin</div><div class="stat-val">${margin.toFixed(1)}%</div></div>`;
}

function renderLowBanner() {
  const low = inventory.filter(i => i.stock > 0 && i.stock <= i.alert_at);
  const out = inventory.filter(i => i.stock <= 0);
  const b = document.getElementById('low-banner');
  if (!out.length && !low.length) { b.style.display = 'none'; return; }
  b.style.display = 'block';
  b.innerHTML = (out.length ? '🔴 OUT: ' + out.slice(0, 8).map(i => i.name).join(', ') : '') +
    (low.length ? (out.length ? '<br>' : '') + '⚠️ LOW: ' + low.slice(0, 8).map(i => i.name + ' (' + i.stock + ')').join(', ') : '');
}

function renderTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('cat-filter').value;
  const sf = document.getElementById('status-filter').value;
  let data = [...inventory];
  if (q) data = data.filter(i => i.name?.toLowerCase().includes(q));
  if (cat) data = data.filter(i => i.category === cat);
  if (sf === 'ok') data = data.filter(i => i.stock > i.alert_at);
  if (sf === 'low') data = data.filter(i => i.stock > 0 && i.stock <= i.alert_at);
  if (sf === 'out') data = data.filter(i => i.stock <= 0);
  const body = document.getElementById('inv-body');
  if (!data.length) { body.innerHTML = '<tr><td colspan="8"><div class="empty"><span class="empty-icon">💊</span><p>No medicines found</p></div></td></tr>'; return; }
  body.innerHTML = data.map((item, i) => {
    const out = item.stock <= 0, low = item.stock > 0 && item.stock <= item.alert_at;
    const badge = out ? '<span class="badge bg-red">Out</span>' : low ? '<span class="badge bg-amber">⚠️ Low</span>' : '<span class="badge bg-green">OK</span>';
    const stockDisplay = out ? '<span class="profit-neg">0</span>' : low ? '<span style="color:var(--amber)">' + item.stock + '</span>' : '<span class="profit-pos">' + item.stock + '</span>';
    return '<tr><td class="num-col">' + (i + 1) + '</td><td><strong>' + item.name + '</strong></td><td><span class="badge bg-gray">' + (item.category || '—') + '</span></td><td>' + stockDisplay + '</td><td>' + fmtKSh(item.price) + '</td><td style="color:var(--text3)">' + item.alert_at + '</td><td>' + badge + '</td><td style="display:flex;gap:6px;">' +
      (!isOwner() ? '<button class="btn btn-ghost btn-sm" onclick="openRestock(\'' + item.id + '\')">+ Restock</button><button class="btn btn-ghost btn-sm" onclick="openEdit(\'' + item.id + '\')">Edit</button><button class="btn btn-danger btn-sm" onclick="deleteItem(\'' + item.id + '\')">Del</button>' : '') +
    '</td></tr>';
  }).join('');
}

async function saveMedicine() {
  if (isOwner()) { toast('Owners cannot add medicines', 'error'); return; }
  const name = document.getElementById('inv-name').value.trim();
  const price = parseFloat(document.getElementById('inv-price').value) || 0;
  const stock = parseInt(document.getElementById('inv-stock').value) || 0;
  const alert_at = parseInt(document.getElementById('inv-alert').value) || 10;
  if (!name || !price) { toast('Name and price are required', 'error'); return; }
  const item = { id: uid(), name, category: document.getElementById('inv-cat').value, price, stock, alert_at, unit_cost: 0, created_at: new Date().toISOString() };
  await sbInsert('inventory', item);
  inventory.push(item);
  closeModal('modal-add');
  ['inv-name','inv-price','inv-stock'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('inv-alert').value = '10';
  renderStats(); renderTable(); renderLowBanner();
  toast('Medicine added ✅');
}

function openRestock(id) {
  restockId = id;
  const item = inventory.find(x => x.id === id);
  document.getElementById('restock-info').innerHTML = '<strong>' + item.name + '</strong><br>Current stock: <strong style="color:var(--green)">' + item.stock + ' pcs</strong><br>Alert threshold: ' + item.alert_at;
  document.getElementById('restock-qty').value = '';
  openModal('modal-restock');
}

async function confirmRestock() {
  const qty = parseInt(document.getElementById('restock-qty').value) || 0;
  if (qty <= 0) { toast('Enter valid quantity', 'error'); return; }
  const item = inventory.find(x => x.id === restockId);
  const newStock = (item.stock || 0) + qty;
  await sbUpdate('inventory', item.id, { stock: newStock });
  item.stock = newStock;
  closeModal('modal-restock');
  renderStats(); renderTable(); renderLowBanner();
  toast('Stock updated ✅');
}

function openEdit(id) {
  const item = inventory.find(x => x.id === id);
  document.getElementById('edit-id').value = id;
  document.getElementById('edit-price').value = item.price;
  document.getElementById('edit-alert').value = item.alert_at;
  openModal('modal-edit');
}

async function saveEdit() {
  const id = document.getElementById('edit-id').value;
  const price = parseFloat(document.getElementById('edit-price').value) || 0;
  const alert_at = parseInt(document.getElementById('edit-alert').value) || 10;
  await sbUpdate('inventory', id, { price, alert_at });
  const item = inventory.find(x => x.id === id);
  item.price = price; item.alert_at = alert_at;
  closeModal('modal-edit');
  renderTable();
  toast('Updated ✅');
}

async function deleteItem(id) {
  if (!confirm('Delete this medicine?')) return;
  await sbDelete('inventory', id);
  inventory = inventory.filter(x => x.id !== id);
  renderStats(); renderTable(); renderLowBanner();
  toast('Deleted');
}

init();
</script>
</body>
</html>
