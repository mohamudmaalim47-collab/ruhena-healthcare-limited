<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shifts — Ruhena Healthcare</title>
<link rel="stylesheet" href="shared.css">
<style>
  .shift-grid{display:grid;gap:16px;margin-bottom:24px;}
  .shift-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;transition:all .2s;}
  .shift-card:hover{border-color:var(--p-400);}
  .shift-card .sc-user{font-weight:700;font-size:14px;}
  .shift-card .sc-time{font-size:12px;color:var(--text3);}
  .shift-card .sc-stats{display:flex;gap:16px;font-size:13px;}
  .shift-card .sc-stats span{color:var(--text2);}
  .shift-card .sc-stats strong{color:var(--text);}
  .shift-card.open{border-left:4px solid var(--green);}
  .shift-card.closed{border-left:4px solid var(--border);}
</style>
</head>
<body>
<div class="page-wrap">
  <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="drawer-logo">💊</div>
      <div class="drawer-brand">Ruhena <span>Healthcare</span></div>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-user">
      <div class="drawer-user-avatar" id="drawer-avatar">A</div>
      <div class="drawer-user-info">
        <div class="drawer-user-name" id="drawer-name">Admin</div>
        <div class="drawer-user-role" id="drawer-role">Owner</div>
      </div>
    </div>
    <div class="drawer-nav" id="drawer-nav"></div>
    <div class="drawer-footer">
      <button class="theme-btn" onclick="toggleTheme()">🌙</button>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </div>

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="hamburger" onclick="toggleDrawer()">☰</button>
        <div class="role-badge" id="role-badge"></div>
      </div>
      <div class="topbar-right">
        <span class="topbar-date" id="topbar-date"></span>
      </div>
    </div>

    <div class="content">
  <div class="page-header">
    <div class="page-title">⏰ Shift Management</div>
    <button class="btn btn-primary" onclick="startShift()">🟢 Start Shift</button>
  </div>

  <div class="shift-grid" id="shift-grid"></div>

  <div class="card">
    <div class="card-title">📋 Shift History</div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Staff</th><th>Start</th><th>End</th><th>Sales</th><th>Cash</th><th>M-Pesa</th><th>Status</th></tr></thead>
        <tbody id="shift-history-body"></tbody>
      </table>
    </div>
  </div>
</div>

    <footer><span>© 2026 Ruhena Healthcare Limited</span><span>Firebase + Vercel · v3.0</span></footer>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="shared.js"></script>
<script>
const session = requireAuth();
applyTheme();
buildDrawerNav('shifts');

let shifts = [];

async function loadData() {
  shifts = await sbFetch('shifts?order=start_time.desc&limit=200').catch(() => []);
  renderActive();
  renderHistory();
}

function renderActive() {
  const el = document.getElementById('shift-grid');
  const active = shifts.filter(s => s.status === 'open');
  if (!active.length) {
    el.innerHTML = '<div class="empty"><span class="empty-icon">⏰</span><p>No active shifts. Start your shift to begin tracking.</p></div>';
    return;
  }
  el.innerHTML = active.map(s => `<div class="shift-card open">
    <div>
      <div class="sc-user">${s.user_name || s.user_id}</div>
      <div class="sc-time">Started ${new Date(s.start_time).toLocaleTimeString('en-KE', {hour:'2-digit',minute:'2-digit'})}</div>
    </div>
    <div class="sc-stats">
      <span>Sales: <strong>${fmtKSh(s.sales_total || 0)}</strong></span>
      <span>Cash: <strong>${fmtKSh(s.opening_cash || 0)}</strong></span>
    </div>
    <button class="btn btn-sm btn-ghost" onclick="endShift('${s.id}')">🔚 End Shift</button>
  </div>`).join('');
}

function renderHistory() {
  const body = document.getElementById('shift-history-body');
  const closed = shifts.filter(s => s.status === 'closed');
  if (!closed.length) { body.innerHTML = '<tr><td colspan="7"><div class="empty"><span class="empty-icon">📋</span><p>No shift history</p></div></td></tr>'; return; }
  body.innerHTML = closed.slice(0, 20).map(s => `<tr>
    <td><strong>${s.user_name || s.user_id}</strong></td>
    <td style="font-size:12px;">${new Date(s.start_time).toLocaleDateString('en-KE', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</td>
    <td style="font-size:12px;">${s.end_time ? new Date(s.end_time).toLocaleDateString('en-KE', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '—'}</td>
    <td class="profit-pos">${fmtKSh(s.sales_total || 0)}</td>
    <td>${fmtKSh(s.opening_cash || 0)}</td>
    <td>${fmtKSh(s.mpesa_balance || 0)}</td>
    <td><span class="badge bg-gray">Closed</span></td>
  </tr>`).join('');
}

async function startShift() {
  try {
    const existing = shifts.find(s => s.user_id === session.id && s.status === 'open');
    if (existing) { toast('You already have an active shift', 'warning'); return; }
    await sbInsert('shifts', {
      id: uid(),
      user_id: session.id,
      user_name: session.name,
      start_time: new Date().toISOString(),
      opening_cash: 0,
      sales_total: 0,
      mpesa_balance: 0,
      status: 'open'
    });
    toast('Shift started', 'success');
    loadData();
  } catch(e) { toast(e.message, 'error'); }
}

async function endShift(id) {
  if (!confirm('End this shift?')) return;
  try {
    await sbUpdate('shifts', id, {
      status: 'closed',
      end_time: new Date().toISOString()
    });
    toast('Shift ended', 'success');
    loadData();
  } catch(e) { toast(e.message, 'error'); }
}

loadData();
</script>
</body>
</html>
