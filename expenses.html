<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expenses — Ruhena Healthcare</title>
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page-wrap">
  <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="drawer-logo"><i class="bi bi-capsule"></i></div>
      <div class="drawer-brand">Ruhena <span>Healthcare</span></div>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-user">
      <div class="drawer-user-avatar" id="drawer-avatar">A</div>
      <div class="drawer-user-info">
        <div class="drawer-user-name" id="drawer-name">Admin</div>
        <div class="drawer-user-role" id="drawer-role">Owner</div>
      </div>
    </div>
    <div class="drawer-nav" id="drawer-nav"></div>
    <div class="drawer-footer">
      <button class="theme-btn" onclick="toggleTheme()">🌙</button>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </div>

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="hamburger" onclick="toggleDrawer()">☰</button>
        <div class="role-badge" id="role-badge"></div>
      </div>
      <div class="topbar-right">
        <span class="topbar-date" id="topbar-date"></span>
      </div>
    </div>

    <div class="content">
  <div class="page-header">
    <div class="page-title"><i class="bi bi-cash-stack"></i> Expenses</div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
      <input type="date" class="date-filter" id="from-filter" oninput="renderTable()">
      <input type="date" class="date-filter" id="to-filter" oninput="renderTable()">
      <select class="date-filter" id="cat-filter" onchange="renderTable()" style="width:160px;">
        <option value="">All Categories</option>
        <option>Rent</option><option>Salaries</option><option>Utilities</option>
        <option>Transport</option><option>Repairs & Maintenance</option>
        <option>Licenses & Permits</option><option>Marketing</option><option>Miscellaneous</option>
      </select>
      <button class="btn btn-ghost btn-sm" onclick="clearFilters()">Clear</button>
      <button class="btn btn-primary" id="btn-add" onclick="openModal('modal-expense')">+ Add Expense</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px;" id="exp-stats"></div>

  <div class="glass-card">
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>#</th><th>Date</th><th>Category</th><th>Description</th><th>Amount</th><th>Payment</th><th>Added By</th><th id="action-col"></th></tr></thead>
        <tbody id="exp-body"></tbody>
      </table>
    </div>
  </div>
    </div>
    <footer><span>© 2026 Ruhena Healthcare Limited</span><span>v2.0</span></footer>
  </div>
</div>

<!-- ADD EXPENSE MODAL -->
<div class="modal-overlay" id="modal-expense">
  <div class="modal" style="width:480px;">
    <div class="modal-title">Add Expense</div>
    <div class="form-row form-row-2">
      <div class="form-group"><label class="form-label">Date *</label><input class="form-input" type="date" id="exp-date"></div>
      <div class="form-group"><label class="form-label">Category *</label>
        <select class="form-input" id="exp-cat">
          <option>Rent</option><option>Salaries</option><option>Utilities</option>
          <option>Transport</option><option>Repairs & Maintenance</option>
          <option>Licenses & Permits</option><option>Marketing</option><option>Miscellaneous</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Description *</label><input class="form-input" id="exp-desc" placeholder="e.g. Shop rent for June 2026"></div>
    <div class="form-row form-row-2">
      <div class="form-group"><label class="form-label">Amount (KSh) *</label><input class="form-input" type="number" id="exp-amount" placeholder="0" min="0"></div>
      <div class="form-group"><label class="form-label">Payment Method</label>
        <select class="form-input" id="exp-pm">
          <option value="C">Cash</option>
          <option value="M">M-Pesa</option>
          <option value="B">Bank Transfer</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-expense')">Cancel</button>
      <button class="btn btn-primary" onclick="saveExpense()">Save Expense</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="shared.js"></script>
<script>
requireAuth(); applyTheme(); buildDrawerNav('expenses');
let expenses = [];

async function init() {
  expenses = await sbFetch('expenses?order=date.desc&limit=2000').catch(() => []);
  document.getElementById('exp-date').value = todayStr();
  renderStats();
  renderTable();
  if (isOwner()) document.getElementById('btn-add').style.display = 'none';
}

function clearFilters() {
  document.getElementById('from-filter').value = '';
  document.getElementById('to-filter').value = '';
  document.getElementById('cat-filter').value = '';
  renderTable();
}

function renderStats() {
  const month = monthStr();
  const today = todayStr();
  const monthExp = expenses.filter(e => e.date?.startsWith(month)).reduce((s, e) => s + e.amount, 0);
  const todayExp = expenses.filter(e => e.date === today).reduce((s, e) => s + e.amount, 0);
  const total = expenses.reduce((s, e) => s + e.amount, 0);
  const avg = expenses.length > 0 ? total / expenses.length : 0;
  document.getElementById('exp-stats').innerHTML = `
    <div class="stat-card stat-red"><div class="stat-lbl">Total Expenses</div><div class="stat-val">${fmtKSh(total)}</div><div class="stat-sub">all time</div></div>
    <div class="stat-card stat-amber"><div class="stat-lbl">This Month</div><div class="stat-val">${fmtKSh(monthExp)}</div></div>
    <div class="stat-card stat-blue"><div class="stat-lbl">Today</div><div class="stat-val">${fmtKSh(todayExp)}</div></div>
    <div class="stat-card stat-purple"><div class="stat-lbl">Avg per Entry</div><div class="stat-val">${fmtKSh(avg)}</div></div>`;
}

function renderTable() {
  const from = document.getElementById('from-filter').value;
  const to = document.getElementById('to-filter').value;
  const cat = document.getElementById('cat-filter').value;
  let data = [...expenses];
  if (from) data = data.filter(e => e.date >= from);
  if (to) data = data.filter(e => e.date <= to);
  if (cat) data = data.filter(e => e.category === cat);
  const body = document.getElementById('exp-body');
  if (!data.length) { body.innerHTML = '<tr><td colspan="8"><div class="empty"><div class="empty-icon">💸</div><p>No expenses found</p></div></td></tr>'; return; }
  body.innerHTML = data.map((e, i) => `<tr>
    <td class="num-col">${i + 1}</td>
    <td style="font-size:12px">${fmtDate(e.date)}</td>
    <td><span class="badge bg-blue">${e.category}</span></td>
    <td>${e.description || '—'}</td>
    <td class="profit-neg"><strong>${fmtKSh(e.amount)}</strong></td>
    <td><span class="badge ${e.pm === 'M' ? 'pm-M' : e.pm === 'B' ? 'bg-purple' : 'pm-C'}">${e.pm === 'M' ? 'M-Pesa' : e.pm === 'B' ? 'Bank' : 'Cash'}</span></td>
    <td style="font-size:12px;color:var(--text2)">${e.added_by || ''}</td>
    <td>${!isOwner() ? `<button class="btn btn-danger btn-sm" onclick="deleteExpense('${e.id}')">Del</button>` : ''}</td>
  </tr>`).join('');
}

async function saveExpense() {
  const session = getSession();
  const date = document.getElementById('exp-date').value;
  const category = document.getElementById('exp-cat').value;
  const description = document.getElementById('exp-desc').value.trim();
  const amount = parseFloat(document.getElementById('exp-amount').value) || 0;
  if (!date || !description || amount <= 0) { toast('Fill all required fields', 'error'); return; }
  const exp = { id: uid(), date, category, description, amount, pm: document.getElementById('exp-pm').value, added_by: session.name, added_at: new Date().toISOString() };
  await sbInsert('expenses', exp);
  expenses.unshift(exp);
  document.getElementById('exp-desc').value = '';
  document.getElementById('exp-amount').value = '';
  document.getElementById('exp-date').value = todayStr();
  closeModal('modal-expense');
  renderStats();
  renderTable();
  toast('Expense saved ✅');
}

async function deleteExpense(id) {
  if (!confirm('Delete this expense?')) return;
  await sbDelete('expenses', id);
  expenses = expenses.filter(e => e.id !== id);
  renderStats();
  renderTable();
  toast('Deleted');
}

init();
</script>
</body>
</html>
