<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Branches — Ruhena Healthcare</title>
<link rel="stylesheet" href="shared.css">
<style>
  .branch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}
  .branch-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;transition:all .2s;}
  .branch-card:hover{border-color:var(--p-400);box-shadow:var(--shadow);transform:translateY(-2px);}
  .branch-card .bc-name{font-family:var(--font-display);font-size:18px;font-weight:700;margin-bottom:4px;}
  .branch-card .bc-loc{font-size:13px;color:var(--text2);margin-bottom:12px;}
  .branch-card .bc-stat{display:flex;gap:16px;margin-bottom:12px;}
  .branch-card .bc-stat span{font-size:12px;color:var(--text3);}
  .branch-card .bc-stat strong{color:var(--text);font-size:14px;}
</style>
</head>
<body>
<div class="page-wrap">
  <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="drawer-logo"><i class="bi bi-capsule"></i></div>
      <div class="drawer-brand">Ruhena <span>Healthcare</span></div>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-user">
      <div class="drawer-user-avatar" id="drawer-avatar">A</div>
      <div class="drawer-user-info">
        <div class="drawer-user-name" id="drawer-name">Admin</div>
        <div class="drawer-user-role" id="drawer-role">Owner</div>
      </div>
    </div>
    <div class="drawer-nav" id="drawer-nav"></div>
    <div class="drawer-footer">
      <button class="theme-btn" onclick="toggleTheme()">🌙</button>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </div>

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="hamburger" onclick="toggleDrawer()">☰</button>
        <div class="role-badge" id="role-badge"></div>
      </div>
      <div class="topbar-right">
        <span class="topbar-date" id="topbar-date"></span>
      </div>
    </div>

    <div class="content">
  <div class="page-header">
    <div class="page-title"><i class="bi bi-shop"></i> Branches</div>
    <button class="btn btn-primary" onclick="openModal('branch-modal')">+ Add Branch</button>
  </div>
  <div class="branch-grid" id="branch-grid"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="branch-modal">
  <div class="modal">
    <div class="modal-title">Add Branch</div>
    <div class="form-group"><label class="form-label">Branch Name *</label><input class="form-input" id="b-name" placeholder="e.g. Nairobi CBD"></div>
    <div class="form-row form-row-2">
      <div class="form-group"><label class="form-label">Location</label><input class="form-input" id="b-loc" placeholder="e.g. Moi Avenue"></div>
      <div class="form-group"><label class="form-label">Phone</label><input class="form-input" id="b-phone" placeholder="+254 20 XXX XXXX"></div>
    </div>
    <div class="form-group"><label class="form-label">License Number</label><input class="form-input" id="b-license" placeholder="PHARM-001"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('branch-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveBranch()">Save Branch</button>
    </div>
  </div>
</div>

    <footer><span>© 2026 Ruhena Healthcare Limited</span><span>Firebase + Vercel · v3.0</span></footer>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="shared.js"></script>
<script>
const session = requireAuth();
applyTheme();
buildDrawerNav('branches');

let branches = [];

async function loadData() {
  branches = await sbFetch('branches?order=name.asc&limit=100').catch(() => []);
  render();
}

function render() {
  const el = document.getElementById('branch-grid');
  if (!branches.length) { el.innerHTML = '<div class="empty" style="grid-column:1/-1;"><span class="empty-icon">🏪</span><p>No branches yet. Add your first branch.</p></div>'; return; }
  el.innerHTML = branches.map(b => `<div class="branch-card">
    <div class="bc-name">${b.name}</div>
    <div class="bc-loc">${b.location || '—'} · ${b.phone || '—'}</div>
    <div class="bc-stat">
      <span>License: <strong>${b.license || '—'}</strong></span>
    </div>
    <div style="display:flex;gap:6px;">
      <span class="badge bg-green">${b.isActive !== false ? 'Active' : 'Inactive'}</span>
      <button class="btn btn-sm btn-danger" onclick="deleteBranch('${b.id}')">🗑️</button>
    </div>
  </div>`).join('');
}

async function saveBranch() {
  const name = document.getElementById('b-name').value.trim();
  if (!name) { toast('Branch name required', 'error'); return; }
  try {
    await sbInsert('branches', {
      id: uid(), name,
      location: document.getElementById('b-loc').value.trim(),
      phone: document.getElementById('b-phone').value.trim(),
      license: document.getElementById('b-license').value.trim(),
      isActive: true
    });
    toast('Branch added', 'success');
    closeModal('branch-modal');
    document.querySelectorAll('#branch-modal .form-input').forEach(i => i.value = '');
    loadData();
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteBranch(id) {
  if (!confirm('Delete this branch?')) return;
  try { await sbDelete('branches', id); toast('Deleted', 'success'); loadData(); }
  catch(e) { toast(e.message, 'error'); }
}

loadData();
</script>
</body>
</html>
