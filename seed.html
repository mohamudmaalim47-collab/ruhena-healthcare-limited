async function seedAll() {
  const btn = document.getElementById('seed-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Seeding in progress...';

  try {
    // Step 1: Check Firestore connection
    status('s-auth', 'Firestore connected — writing data...', 'done');
    
    // Step 2: Create admin profile in Firestore
    const adminUid = 'K5ZbLe5rCxe7Z12bJw0R58GcZhG3';
    await db.collection('users').doc(adminUid).set({
      id: adminUid,
      email: 'admin@ruhena.com',
      name: 'Admin',
      role: 'owner',
      active: true,
      created_at: new Date().toISOString()
    });
    status('s-admin', 'Admin profile created (admin@ruhena.com / admin123)', 'done');

    // Step 3: Seed 452 drugs in batches
    const BATCH_SIZE = 50;
    for (let i = 0; i < DRUGS.length; i += BATCH_SIZE) {
      const batch = db.batch();
      const chunk = DRUGS.slice(i, i + BATCH_SIZE);
      chunk.forEach(d => {
        const ref = db.collection('inventory').doc(d.id);
        batch.set(ref, { ...d, price: 0, stock: 0, alert_at: 10, id: d.id });
      });
      await batch.commit();
      status('s-drugs', `Seeding medicines... ${Math.min(i + BATCH_SIZE, DRUGS.length)} / ${DRUGS.length}`, 'spin');
    }
    
    status('s-drugs', `All ${DRUGS.length} medicines seeded ✅`, 'done');
    btn.textContent = '✅ Seeding Complete!';
    btn.style.background = '#00d68f';
    
  } catch(e) {
    status('s-auth', 'Error: ' + e.message, 'fail');
    btn.disabled = false;
    btn.textContent = '🔄 Retry Seeding';
  }
}

// Auto-start
seedAll();
