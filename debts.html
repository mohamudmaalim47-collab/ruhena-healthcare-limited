<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debts — Ruhena Healthcare</title>
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page-wrap">
  <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="drawer-logo">💊</div>
      <div class="drawer-brand">Ruhena <span>Healthcare</span></div>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-user">
      <div class="drawer-user-avatar" id="drawer-avatar">A</div>
      <div class="drawer-user-info">
        <div class="drawer-user-name" id="drawer-name">Admin</div>
        <div class="drawer-user-role" id="drawer-role">Owner</div>
      </div>
    </div>
    <div class="drawer-nav" id="drawer-nav"></div>
    <div class="drawer-footer">
      <button class="theme-btn" onclick="toggleTheme()">🌙</button>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </div>

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="hamburger" onclick="toggleDrawer()">☰</button>
        <div class="role-badge" id="role-badge"></div>
      </div>
      <div class="topbar-right">
        <span class="topbar-date" id="topbar-date"></span>
      </div>
    </div>

    <div class="content">
  <div class="page-header">
    <div class="page-title">💳 Debt Register</div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
      <select class="date-filter" id="status-filter" onchange="renderTable()" style="width:130px;">
        <option value="">All Status</option>
        <option value="owing">Owing</option>
        <option value="paid">Paid</option>
      </select>
      <div class="search-wrap">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 20 20"><circle cx="9" cy="9" r="6"/><path d="M15 15l3 3"/></svg>
        <input class="search-input" id="search" placeholder="Search name..." oninput="renderTable()">
      </div>
      <button class="btn btn-primary" id="btn-add" onclick="openAddModal()">+ Add Debt</button>
    </div>
  </div>
  <div class="glass-card">
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>#</th><th>Name</th><th>Phone</th><th>Residence</th><th>Medicines</th><th>Total</th><th>Paid</th><th>Balance</th><th>Status</th><th>Date</th><th id="action-col"></th></tr></thead>
        <tbody id="debts-body"></tbody>
      </table>
    </div>
  </div>
    </div>
    <footer><span>© 2026 Ruhena Healthcare Limited</span><span>v2.0</span></footer>
  </div>
</div>

<!-- ADD DEBT MODAL -->
<div class="modal-overlay" id="modal-debt">
  <div class="modal" style="width:660px;">
    <div class="modal-title">Record Debt</div>
    <div class="form-row form-row-2">
      <div class="form-group"><label class="form-label">Patient Name *</label><input class="form-input" id="db-name" placeholder="e.g. Hassan Ali"></div>
      <div class="form-group"><label class="form-label">Phone *</label><input class="form-input" id="db-phone" placeholder="07xx xxx xxx"></div>
    </div>
    <div class="form-row form-row-2">
      <div class="form-group"><label class="form-label">Residence *</label><input class="form-input" id="db-residence" placeholder="e.g. Woodland Estate"></div>
      <div class="form-group"><label class="form-label">House/Unit</label><input class="form-input" id="db-house" placeholder="e.g. C3"></div>
    </div>
    <div class="form-group" style="max-width:200px;"><label class="form-label">Date *</label><input class="form-input" type="date" id="db-date"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin:14px 0 8px;">
      <label class="form-label" style="margin:0;font-weight:600;color:var(--text);">Medicines *</label>
      <button type="button" class="btn btn-ghost btn-sm" onclick="addMedRow()">+ Add Row</button>
    </div>
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;margin-bottom:12px;">
      <div style="display:grid;grid-template-columns:1fr 70px 100px 90px 32px;padding:7px 10px;background:var(--surface3);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);">
        <span>Medicine</span><span>Qty</span><span>Price/Unit</span><span>Subtotal</span><span></span>
      </div>
      <div id="med-rows"></div>
    </div>
    <div style="display:flex;justify-content:flex-end;align-items:center;gap:12px;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);">
      <span style="font-size:13px;color:var(--text2);">Grand Total:</span>
      <span id="grand-total" style="font-size:18px;font-weight:700;color:var(--green);">KSh 0</span>
    </div>
    <datalist id="med-list2"></datalist>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-debt')">Cancel</button>
      <button class="btn btn-primary" onclick="saveDebt()">Save Debt</button>
    </div>
  </div>
</div>

<!-- PAYMENT MODAL -->
<div class="modal-overlay" id="modal-pay">
  <div class="modal" style="width:400px;">
    <div class="modal-title">Record Payment</div>
    <div id="pay-info" style="background:var(--surface2);border-radius:var(--r-sm);padding:12px;margin-bottom:16px;font-size:13px;color:var(--text2);line-height:1.8;"></div>
    <div class="form-group"><label class="form-label">Amount Paid (KSh) *</label><input class="form-input" type="number" id="pay-amount" placeholder="0" min="0"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-pay')">Cancel</button>
      <button class="btn btn-primary" onclick="recordPayment()">Confirm Payment</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="shared.js"></script>
<script>
requireAuth(); applyTheme(); buildDrawerNav('debts');
let debts = [], inventory = [], payId = null, rowCount = 0;

async function init() {
  [debts, inventory] = await Promise.all([
    sbFetch('debts?order=added_at.desc&limit=2000'),
    sbFetch('inventory?order=name.asc&limit=2000')
  ]);
  document.getElementById('med-list2').innerHTML = inventory.map(i => `<option value="${i.name}">`).join('');
  renderTable();
  if (isOwner()) { document.getElementById('btn-add').style.display = 'none'; }
}

function renderTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const sf = document.getElementById('status-filter').value;
  let data = [...debts];
  if (q) data = data.filter(d => d.name?.toLowerCase().includes(q) || d.phone?.includes(q));
  if (sf === 'owing') data = data.filter(d => (d.amount || 0) > (d.paid || 0));
  if (sf === 'paid') data = data.filter(d => (d.paid || 0) >= (d.amount || 0));
  const body = document.getElementById('debts-body');
  if (!data.length) { body.innerHTML = '<tr><td colspan="11"><div class="empty"><div class="empty-icon">📋</div><p>No debts found</p></div></td></tr>'; return; }
  body.innerHTML = data.map((d, i) => {
    const bal = (d.amount || 0) - (d.paid || 0);
    const paid = bal <= 0;
    const meds = Array.isArray(d.medicines) ? d.medicines.map(m => `${m.name}${m.qty ? ' x' + m.qty : ''}`).join(', ') : '';
    return `<tr>
      <td class="num-col">${i + 1}</td>
      <td><strong>${d.name}</strong></td>
      <td style="font-size:12px">${d.phone}</td>
      <td style="font-size:12px">${d.residence}${d.house ? ' ' + d.house : ''}</td>
      <td style="font-size:12px;max-width:180px;">${meds}</td>
      <td>${fmtKSh(d.amount)}</td>
      <td class="profit-pos">${fmtKSh(d.paid || 0)}</td>
      <td class="${paid ? 'profit-pos' : 'profit-neg'}">${fmtKSh(bal)}</td>
      <td>${paid ? '<span class="badge bg-green">Paid</span>' : '<span class="badge bg-red">Owing</span>'}</td>
      <td style="font-size:12px">${fmtDate(d.date)}</td>
      <td style="display:flex;gap:5px;">
        ${!paid && !isOwner() ? `<button class="btn btn-ghost btn-sm" onclick="openPayModal('${d.id}')">💳 Pay</button>` : ''}
        ${!isOwner() ? `<button class="btn btn-danger btn-sm" onclick="deleteDebt('${d.id}')">Del</button>` : ''}
      </td>
    </tr>`;
  }).join('');
}

function openAddModal() {
  if (isOwner()) { toast('Owners cannot add debts', 'error'); return; }
  ['db-name','db-phone','db-residence','db-house'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('db-date').value = todayStr();
  document.getElementById('med-rows').innerHTML = '';
  rowCount = 0;
  addMedRow();
  openModal('modal-debt');
}

function addMedRow(med = '', qty = '', price = '') {
  rowCount++;
  const id = rowCount;
  const row = document.createElement('div');
  row.id = 'row-' + id;
  row.style.cssText = 'display:grid;grid-template-columns:1fr 70px 100px 90px 32px;padding:6px 10px;border-top:1px solid var(--border);align-items:center;gap:4px;';
  row.innerHTML = `
    <input class="form-input" style="font-size:12px;padding:6px 8px;" placeholder="Medicine" list="med-list2" value="${med}" oninput="recalc()">
    <input class="form-input" style="font-size:12px;padding:6px 8px;" type="number" min="0" placeholder="0" value="${qty}" oninput="recalc()">
    <input class="form-input" style="font-size:12px;padding:6px 8px;" type="number" min="0" placeholder="0.00" value="${price}" oninput="recalc()">
    <span id="sub-${id}" style="font-size:12px;font-weight:600;color:var(--green);text-align:right;">KSh 0</span>
    <button type="button" onclick="removeRow(${id})" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;">×</button>`;
  document.getElementById('med-rows').appendChild(row);
  recalc();
}

function removeRow(id) {
  document.getElementById('row-' + id)?.remove();
  if (!document.getElementById('med-rows').children.length) addMedRow();
  recalc();
}

function recalc() {
  let grand = 0;
  document.querySelectorAll('#med-rows > div').forEach(row => {
    const inputs = row.querySelectorAll('input');
    const sub = (parseFloat(inputs[1]?.value) || 0) * (parseFloat(inputs[2]?.value) || 0);
    grand += sub;
    const el = row.querySelector('[id^="sub-"]');
    if (el) el.textContent = sub > 0 ? fmtKSh(sub) : 'KSh 0';
  });
  document.getElementById('grand-total').textContent = fmtKSh(grand);
}

function getMedLines() {
  return Array.from(document.querySelectorAll('#med-rows > div')).map(row => {
    const inputs = row.querySelectorAll('input');
    return { name: inputs[0]?.value.trim(), qty: parseInt(inputs[1]?.value) || 0, price: parseFloat(inputs[2]?.value) || 0, subtotal: (parseInt(inputs[1]?.value) || 0) * (parseFloat(inputs[2]?.value) || 0) };
  }).filter(m => m.name);
}

async function saveDebt() {
  const session = getSession();
  const name = document.getElementById('db-name').value.trim();
  const phone = document.getElementById('db-phone').value.trim();
  const residence = document.getElementById('db-residence').value.trim();
  const date = document.getElementById('db-date').value;
  if (!name || !phone || !residence || !date) { toast('Fill all required fields', 'error'); return; }
  const meds = getMedLines();
  if (!meds.length) { toast('Add at least one medicine', 'error'); return; }
  const amount = meds.reduce((s, m) => s + m.subtotal, 0);
  const debt = { id: uid(), name, phone, residence, house: document.getElementById('db-house').value.trim(), medicines: meds, amount, paid: 0, date, status: 'owing', added_by: session.name, added_at: new Date().toISOString() };
  await sbInsert('debts', debt);
  debts.unshift(debt);
  closeModal('modal-debt');
  renderTable();
  toast('Debt recorded ✅');
}

function openPayModal(id) {
  if (isOwner()) { toast('Owners cannot record payments', 'error'); return; }
  payId = id;
  const d = debts.find(x => x.id === id);
  const bal = (d.amount || 0) - (d.paid || 0);
  const meds = Array.isArray(d.medicines) ? d.medicines.map(m => m.name).join(', ') : '';
  document.getElementById('pay-info').innerHTML = `<strong>${d.name}</strong> · ${d.phone}<br>Residence: ${d.residence}${d.house ? ' ' + d.house : ''}<br>Items: ${meds}<br>Balance: <strong style="color:var(--red)">${fmtKSh(bal)}</strong>`;
  document.getElementById('pay-amount').value = '';
  openModal('modal-pay');
}

async function recordPayment() {
  const amt = parseFloat(document.getElementById('pay-amount').value) || 0;
  if (amt <= 0) { toast('Enter valid amount', 'error'); return; }
  const d = debts.find(x => x.id === payId);
  const newPaid = (d.paid || 0) + amt;
  const status = newPaid >= d.amount ? 'paid' : 'owing';
  await sbUpdate('debts', d.id, { paid: newPaid, status });
  d.paid = newPaid; d.status = status;
  closeModal('modal-pay');
  renderTable();
  toast('Payment recorded ✅');
}

async function deleteDebt(id) {
  if (!confirm('Delete this debt?')) return;
  await sbDelete('debts', id);
  debts = debts.filter(d => d.id !== id);
  renderTable();
  toast('Deleted');
}

init();
</script>
</body>
</html>
